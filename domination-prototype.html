<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Domination Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;800&display=swap" rel="stylesheet">
<script src="js/core/utils.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
  }

  body {
    background: #e5e5e5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
  }

  #phone, .phone {
    width: 390px;
    height: 844px;
    background: white;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  /* STATUS BAR */
  .status-bar {
    height: 47px;
    background: white;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 0;
    flex-shrink: 0;
  }
  .status-bar .time {
    font-family: 'SF Pro Text', 'Nunito', sans-serif;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: -0.41px;
    color: #010101;
    position: relative;
    z-index: 1;
  }
  .status-bar .notch {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 164px; height: 32px;
    background: black;
    border-radius: 0 0 20px 20px;
    z-index: 0;
  }
  .status-bar .indicators {
    display: flex;
    align-items: center;
    gap: 6px;
    position: relative;
    z-index: 1;
  }
  .signal { display: flex; align-items: flex-end; gap: 1.5px; height: 12px; }
  .signal span { background: #010101; border-radius: 1px; width: 3px; }
  .signal span:nth-child(1) { height: 4px; }
  .signal span:nth-child(2) { height: 6px; }
  .signal span:nth-child(3) { height: 9px; }
  .signal span:nth-child(4) { height: 12px; }
  .battery-icon {
    width: 25px; height: 12px;
    border: 1.5px solid #010101;
    border-radius: 3px;
    position: relative;
  }
  .battery-icon::after {
    content: '';
    position: absolute;
    right: -5px; top: 2px;
    width: 3px; height: 6px;
    background: #010101;
    border-radius: 0 1px 1px 0;
  }
  .battery-fill {
    position: absolute;
    top: 1px; left: 1px; bottom: 1px;
    width: 70%;
    background: #010101;
    border-radius: 1px;
  }

  /* TOP BAR */
  .top-bar {
    height: 41px; /* 88 - 47 for status bar */
    background: white;
    box-shadow: 0 1px 0 0 #EBEBF5;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  .location-row {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    color: #282832;
    font-weight: 400;
  }
  .location-row strong { font-weight: 800; }
  .location-chevron {
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid #D1233E;
    margin-left: 2px;
  }

  /* SEARCH BAR */
  .search-bar {
    height: 52px;
    background: white;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 8px 16px;
  }
  .search-inner {
    flex: 1;
    height: 36px;
    background: #EBEBF5;
    border-radius: 36px;
    display: flex;
    align-items: center;
    padding: 0 16px 0 40px;
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    width: 15px; height: 15px;
    border: 2px solid #777794;
    border-radius: 50%;
  }
  .search-icon::after {
    content: '';
    position: absolute;
    bottom: -5px; right: -4px;
    width: 6px; height: 2px;
    background: #777794;
    transform: rotate(45deg);
    border-radius: 1px;
  }
  .search-placeholder {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: #777794;
  }

  /* TAB BAR — 41px, 13px text, matching new Figma */
  .tab-bar {
    height: 41px;
    background: white;
    box-shadow: 0 1px 0 0 #EBEBF5;
    display: flex;
    align-items: center;
    padding: 7px 15px;
    overflow-x: hidden;
    flex-shrink: 0;
    gap: 0;
  }
  .tab-pill {
    height: 27px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 4px 8px;
    border-radius: 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 13px;
    text-transform: uppercase;
    color: #777794;
    flex-shrink: 0;
    white-space: nowrap;
    cursor: pointer;
  }
  .tab-pill.active {
    background: #D1233E;
    color: white;
  }

  /* AD UNIT — exactly 509px from Figma */
  .ad-unit {
    width: 100%;
    height: 509px;
    background-color: var(--global-bkg-color, #EBEBF5);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .ad-inner {
    position: absolute;
    top: 24px;
    left: 0;
    right: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 0 24px;
    box-sizing: border-box;
    overflow: visible; /* carousel bleeds past this — ad-unit clips at phone edge */
  }

  /* Logo area — 30px tall, full 327px wide */
  .client-logo-area {
    width: 327px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .client-logo-area img {
    max-width: 327px;
    max-height: 30px;
    width: auto; height: auto;
    object-fit: contain;
  }
  .client-logo-placeholder {
    width: 100%; height: 100%;
    background: rgba(255,255,255,0.25);
    border-radius: 4px;
  }

  /* Claim text */
  .claim-text {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: var(--global-text-color, #282832);
    text-align: center;
    width: 327px;
    flex-shrink: 0;
    line-height: 1;
  }

  .single-image-wrap {
    width: 327px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-left: auto;
    margin-right: auto;
  }
  .single-image-wrap .cta-button {
    width: 327px;
  }
  .single-image-area {
    width: 327px;
    height: 327px;
    background: transparent;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .single-image-area img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Carousel — Figma: slides 328px wide, 8px gap, track starts at left:24px.
     The ad unit's overflow:hidden clips at 375px edge, creating the natural peek.
     No overflow:hidden on viewport — the ad unit does the clipping. */
  .carousel-wrap {
    width: 328px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-self: flex-start; /* override center — carousel must left-align for bleed effect */
  }
  .carousel-viewport {
    width: 328px;
    overflow: visible;
    position: relative;
    flex-shrink: 0;
    cursor: grab;
  }
  .carousel-viewport:active { cursor: grabbing; }
  .carousel-track {
    display: flex;
    gap: 8px;
    transition: transform 0.3s ease;
    will-change: transform;
  }
  .carousel-slide {
    flex-shrink: 0;
    width: 328px;
  }
  .slide-image {
    width: 328px;
    height: 328px;
    background: transparent;
    border-radius: 8px;
    overflow: hidden;
  }
  .slide-image img {
    width: 100%; height: 100%;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
  }

  /* Pagination dots */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
    height: 8px;
    flex-shrink: 0;
    width: 328px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--pagination-bkg-color, #777794);
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .dot.active {
    background: var(--pagination-active-color, #D1233E);
  }

  /* CTA Button */
  .cta-button {
    width: 328px; /* carousel button matches slide width */
    height: 45px;
    background-color: var(--button-bkg-color, #000000);
    border-radius: 8px;
    box-shadow: 0 1px 6px 0 rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    border: none;
    outline: none;
  }
  .cta-button span {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: var(--button-text-color, #FFFFFF);
    text-transform: uppercase;
  }

  /* BRAND STRIP — 96px scrollable */
  .brand-strip {
    height: 96px;
    background: white;
    box-shadow: 0 1px 1px 0 #EBEBF5;
    flex-shrink: 0;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .brand-strip::-webkit-scrollbar { display: none; }
  .brand-strip-inner {
    display: flex;
    align-items: flex-start;
    padding: 8px;
    gap: 0;
    width: max-content;
    min-width: 100%;
  }
  .brand-card {
    width: 58px;
    height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    cursor: pointer;
  }
  .brand-bubble-wrap {
    width: 58px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .brand-bubble {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: #f5f5f5;
    overflow: hidden;
    border: 1.5px solid #EBEBF5;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .brand-bubble img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .brand-name {
    font-family: 'Nunito', sans-serif;
    font-weight: 400;
    font-size: 10px;
    color: #282832;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 56px;
    line-height: 14px;
    height: 14px;
    margin-top: 2px;
  }

  /* BOTTOM NAV — 80px */
  .bottom-nav {
    height: 80px;
    background: white;
    box-shadow: 0 -1px 0 0 #EBEBF5;
    display: flex;
    align-items: flex-start;
    justify-content: space-around;
    padding: 4px 0 0;
    flex-shrink: 0;
    position: relative;
  }
  .nav-tab {
    width: 63px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 2px 0;
    cursor: pointer;
  }
  .nav-icon {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-icon svg { width: 24px; height: 24px; }
  .nav-label {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 10px;
    color: #777794;
    text-transform: uppercase;
    text-align: center;
    width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 14px;
    height: 14px;
  }
  .nav-tab.active .nav-label { color: #D1233E; }
  .home-indicator {
    position: absolute;
    bottom: 9px; left: 50%;
    transform: translateX(-50%);
    width: 134px; height: 5px;
    background: black;
    border-radius: 100px;
  }

  /* GHOSTOVER */
  .ghostover {
    position: absolute;
    inset: 0;
    z-index: 9999;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.75);
  }
  .ghostover.visible {
    display: flex;
  }
  .ghostover-content {
    position: relative;
    width: 100%;
    max-width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ghostover-img {
    width: 100%;
    height: auto;
    max-height: 85vh;
    object-fit: contain;
    display: block;
    background: transparent;
  }
  .ghostover-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: auto;
    height: auto;
    background: transparent;
    border: none;
    cursor: pointer;
    z-index: 10000;
    color: white;
    font-size: 27px;
    line-height: 1;
    text-shadow:
      0 0 4px rgba(0,0,0,0.8),
      0 1px 3px rgba(0,0,0,0.6);
    padding: 8px;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .ghostover-close:hover {
    opacity: 0.8;
  }
</style>
</head>

  </div>

  <!-- BRAND STRIP -->

  <!-- BOTTOM NAV -->

    <div class="nav-tab">

        <svg viewBox="0 0 24 24" fill="none">

      <span class="nav-label" id="nav-list">La mia lista</span>

    <div class="nav-tab">
      <div class="nav-icon">

        </svg>

      <span class="nav-label" id="nav-menu">Menu</span>
    </div>
    <div class="home-indicator"></div>
  </div>

  <!-- GHOSTOVER -->
  <div class="ghostover" id="ghostover">
    <button class="ghostover-close" onclick="closeGhostover()">✕</button>
    <div class="ghostover-content">
      <video
        id="ghostover-video"

        playsinline
        muted
        style="width:100%;height:auto;max-height:85vh;object-fit:contain;display:block;background:transparent;">
      </video>
    </div>
  </div>

</div>

// ─── PARAMS ──────────────────────────────────────────────────────────
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    country:               (p.get('country') || 'IT').toUpperCase(),
    templateType:          p.get('templateType') || 'Single',
    claimText:             p.get('claimText') || 'presenta',
    buttonText:            p.get('buttonText') || 'Click Here',
    globalBkgColor:        p.get('globalBkgColor') || '#EBEBF5',
    globalTextColor:       p.get('globalTextColor') || '#282832',
    buttonBkgColor:        p.get('buttonBkgColor') || '#000000',
    buttonTextColor:       p.get('buttonTextColor') || '#FFFFFF',
    paginationBkgColor:    p.get('paginationBkgColor') || '#777794',
    paginationActiveColor: p.get('paginationActiveColor') || '#D1233E',
    clientLogoURL:         p.get('clientLogoURL') || '',
    ghostoverURL:          p.get('ghostoverURL') || '',
    Img01URL:              p.get('Img01URL') || '',
    Img02URL:              p.get('Img02URL') || '',
    Img03URL:              p.get('Img03URL') || '',
    Img04URL:              p.get('Img04URL') || '',
    Img05URL:              p.get('Img05URL') || '',
    Img06URL:              p.get('Img06URL') || '',
  };
}

// ─── CLOCK ───────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
}
updateClock();
setInterval(updateClock, 1000);

// ─── CAROUSEL ────────────────────────────────────────────────────────
let currentSlide = 0;
let totalSlides = 0;
let isDragging = false;
let startX = 0;
let dragOffset = 0;
const SLIDE_WIDTH = 336; // 328px slide + 8px gap

function getTranslateX() { return -currentSlide * SLIDE_WIDTH; }

function applyTransform(extra) {
  const track = document.getElementById('carousel-track');
  if (!track) return;
  track.style.transform = `translateX(${getTranslateX() + (extra || 0)}px)`;
}

function snapToSlide() {
  const track = document.getElementById('carousel-track');
  if (track) track.style.transition = 'transform 0.3s ease';
  applyTransform(0);
  updateDots();
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentSlide);
  });
}

function buildPagination(count) {
  const pg = document.getElementById('pagination');
  if (!pg) return;
  pg.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    pg.appendChild(d);
  }
}

function initCarouselDrag() {
  const vp = document.getElementById('carousel-viewport');
  if (!vp) return;

  // Touch
  vp.addEventListener('touchstart', e => {
    isDragging = true;
    startX = e.touches[0].clientX;
    dragOffset = 0;
    const track = document.getElementById('carousel-track');
    if (track) track.style.transition = 'none';
  }, { passive: true });

  vp.addEventListener('touchmove', e => {
    if (!isDragging) return;
    dragOffset = e.touches[0].clientX - startX;
    applyTransform(dragOffset);
  }, { passive: true });

  vp.addEventListener('touchend', () => {
    if (!isDragging) return;
    isDragging = false;
    if (dragOffset < -50 && currentSlide < totalSlides - 1) currentSlide++;
    else if (dragOffset > 50 && currentSlide > 0) currentSlide--;
    snapToSlide();
  });

  // Mouse
  vp.addEventListener('mousedown', e => {
    isDragging = true;
    startX = e.clientX;
    dragOffset = 0;
    const track = document.getElementById('carousel-track');
    if (track) track.style.transition = 'none';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    dragOffset = e.clientX - startX;
    applyTransform(dragOffset);
  });
  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    if (dragOffset < -50 && currentSlide < totalSlides - 1) currentSlide++;
    else if (dragOffset > 50 && currentSlide > 0) currentSlide--;
    snapToSlide();
  });
}

// ─── GHOSTOVER ───────────────────────────────────────────────────────
function closeGhostover() {
  var g = document.getElementById('ghostover');
  var v = document.getElementById('ghostover-video');
  if (v) { v.pause(); v.currentTime = 0; }
  if (g) g.classList.remove('visible');
}

// ─── INIT ─────────────────────────────────────────────────────────────
async function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const campaignId = urlParams.get('id');

  let p;
  if (campaignId) {
    // Load from campaign JSON via API
    try {
      const res = await fetch('api/get.php?id=' + encodeURIComponent(campaignId));
      if (res.ok) {
        const data = await res.json();
        if (data && !data.error) {
          p = {
            country:               (data.location || 'IT').toUpperCase(),
            templateType:          data.templateType || 'Single',
            claimText:             data.claimText || 'presenta',
            buttonText:            data.buttonText || 'Click Here',
            globalBkgColor:        data.globalBkgColor || '#EBEBF5',
            globalTextColor:       data.globalTextColor || '#282832',
            buttonBkgColor:        data.buttonBkgColor || '#000000',
            buttonTextColor:       data.buttonTextColor || '#FFFFFF',
            paginationBkgColor:    data.paginationBkgColor || '#777794',
            paginationActiveColor: data.paginationActiveColor || '#D1233E',
            clientLogoURL:         data.clientLogoURL || '',
            ghostoverURL:          data.ghostoverURL || '',
            Img01URL:              data.Img01URL || '',
            Img02URL:              data.Img02URL || '',
            Img03URL:              data.Img03URL || '',
            Img04URL:              data.Img04URL || '',
            Img05URL:              data.Img05URL || '',
            Img06URL:              data.Img06URL || '',
          };
        }
      }
    } catch (err) {
      console.error('Failed to load campaign:', err);
    }
  }

  // Fallback to URL params
  if (!p) p = getParams();

  // resolveAssetURL is an alias for the shared resolveURL from js/core/utils.js
  var resolveAssetURL = resolveURL;

  const C = COUNTRIES[p.country] || COUNTRIES.IT;
  const phone = document.getElementById('phone');

  // CSS vars
  phone.style.setProperty('--global-bkg-color', p.globalBkgColor);
  phone.style.setProperty('--global-text-color', p.globalTextColor);
  phone.style.setProperty('--button-bkg-color', p.buttonBkgColor);
  phone.style.setProperty('--button-text-color', p.buttonTextColor);
  phone.style.setProperty('--pagination-bkg-color', p.paginationBkgColor);
  phone.style.setProperty('--pagination-active-color', p.paginationActiveColor);

  // Location
  document.getElementById('location-label').textContent = C.locationLabel;
  document.getElementById('location-city').textContent = C.location;
  document.getElementById('search-placeholder').textContent = C.search;

  // Tabs
  const tabBar = document.getElementById('tab-bar');
  tabBar.innerHTML = '';
  C.tabs.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'tab-pill' + (i === 0 ? ' active' : '');
    el.textContent = t;
    tabBar.appendChild(el);
  });

  // Nav
  const navIds = ['nav-home','nav-cards','nav-fav','nav-list','nav-menu'];
  C.nav.forEach((label, i) => {
    const el = document.getElementById(navIds[i]);
    if (el) el.textContent = label;
  });

  // Claim text
  document.getElementById('claim-text').textContent = p.claimText;

  // Button text
  document.getElementById('btn-text-single').textContent = p.buttonText;
  document.getElementById('btn-text-carousel').textContent = p.buttonText;

  // Logo
  const logoArea = document.getElementById('logo-area');
  const logoPlaceholder = document.getElementById('logo-placeholder');
  if (p.clientLogoURL) {
    logoPlaceholder.style.display = 'none';
    const img = document.createElement('img');
    img.src = resolveAssetURL(p.clientLogoURL);
    img.alt = 'Logo';
    img.onerror = () => {
      img.style.display = 'none';
      logoPlaceholder.style.display = 'block';
    };
    logoArea.appendChild(img);
  }

  // Images
  const imgs = [p.Img01URL, p.Img02URL, p.Img03URL, p.Img04URL, p.Img05URL, p.Img06URL]
    .map(u => resolveAssetURL(u))
    .filter(u => u && u.trim().length > 0);

  const isCarousel = p.templateType.toLowerCase() === 'carousel' && imgs.length > 1;

  if (isCarousel) {
    document.getElementById('carousel-wrap').style.display = 'flex';
    document.getElementById('single-image-wrap').style.display = 'none';

    const track = document.getElementById('carousel-track');
    track.innerHTML = '';
    totalSlides = imgs.length;
    currentSlide = 0;

    imgs.forEach((url, i) => {
      const slide = document.createElement('div');
      slide.className = 'carousel-slide';
      const div = document.createElement('div');
      div.className = 'slide-image';
      const img = document.createElement('img');
      img.src = url;
      img.alt = 'Slide ' + (i + 1);
      img.draggable = false;
      img.onerror = () => { img.style.opacity = '0'; };
      div.appendChild(img);
      slide.appendChild(div);
      track.appendChild(slide);
    });

    buildPagination(imgs.length);
    initCarouselDrag();
    applyTransform(0);

  } else {
    document.getElementById('single-image-wrap').style.display = 'flex';
    document.getElementById('carousel-wrap').style.display = 'none';

    const singleImg = document.getElementById('single-img');
    if (imgs[0]) {
      singleImg.src = imgs[0];
      singleImg.onerror = () => { singleImg.style.opacity = '0'; };
    }
  }

  // Brand strip — text initials bubbles as fallback
  const strip = document.getElementById('brand-strip-inner');
  strip.innerHTML = '';
  C.brands.forEach(name => {
    const card = document.createElement('div');
    card.className = 'brand-card';
    const initials = name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
    card.innerHTML = `
      <div class="brand-bubble-wrap">
        <div class="brand-bubble" style="background:#f0f0f0;">
          <span style="font-family:Nunito,sans-serif;font-weight:800;font-size:13px;color:#282832;">${initials}</span>
        </div>
      </div>
      <span class="brand-name">${name}</span>
    `;
    strip.appendChild(card);
  });

  // Ghostover — uses p which is already set from either fetch or URL params
  var ghostoverURL = p.ghostoverURL || '';

  if (ghostoverURL) {
    setTimeout(function() {
      var g = document.getElementById('ghostover');
      var video = document.getElementById('ghostover-video');
      if (!g || !video) return;

      console.log('ghostover src:', resolveURL(ghostoverURL), 'exists check: will attempt load');
      video.setAttribute('src', resolveURL(ghostoverURL));
      video.loop = false;   /* play once only */
      video.muted = true;   /* required for autoplay */
      video.load();

      /* Show overlay */
      g.classList.add('visible');

      /* Auto-dismiss when video finishes */
      video.addEventListener('ended', function() {
        closeGhostover();
      }, { once: true });

      /* Start playing */
      var playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise.catch(function(err) {
          console.warn('Ghostover autoplay blocked:', err.message);
        });
      }
    }, 800);
  }
}

init();
</script>
