<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ShopperNetwork Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="js/core/utils.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    height: auto;
    overflow: auto;
  }

  body {
    height: auto;
    min-height: 100vh;
    overflow: auto;
    background: #e5e5e5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: 'Plus Jakarta Sans', sans-serif;
    margin: 0;
    padding: 0;
  }

  /* ── PHONE FRAME ── */
  .phone {
    width: 375px;
    position: relative;
    display: flex;
    flex-direction: column;
    background: #fff;
    flex-shrink: 0;
    overflow: visible;
  }

  /* ── SCROLLABLE CONTENT ── */
  .article-content {
    overflow: visible;
    display: flex;
    flex-direction: column;
  }
  .article-img {
    width: 375px;
    display: block;
    margin: 0;
    padding: 0;
    line-height: 0;
  }
  .article-img img {
    width: 100%;
    display: block;
  }

  /* ── CAROUSEL BOX ── */
  .carousel-box {
    width: 375px;
    height: 554px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 0;
    background: #f5f5f5;
    position: relative;
  }

  .carousel-rectangular {
    width: 375px;
    height: 530px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  .carousel-track {
    display: flex;
    flex-direction: row;
    height: 530px;
    transition: transform 0.35s ease;
    will-change: transform;
    cursor: grab;
  }
  .carousel-track:active { cursor: grabbing; }

  .carousel-slide {
    height: 530px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .carousel-slide:first-child { width: 388px; }
  .carousel-slide:not(:first-child) { width: 351px; }

  .carousel-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    user-select: none;
  }

  /* Slider bar */
  .carousel-slider {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 351px;
    height: 34px;
    background: rgba(0, 0, 0, 0.24);
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
  }
  .carousel-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .carousel-dot.active {
    background: rgba(255,255,255,1);
  }

  /* ── OUTBRAIN EXPERIENCE ── */
  .ob-container {
    width: 375px;
    height: 554px;
    display: flex;
    flex-direction: column;
    background: white;
    overflow: hidden;
  }
  .ob-slides-area {
    width: 375px;
    height: 530px;
    flex-shrink: 0;
    position: relative;
    background: white;
    overflow: hidden;
  }
  .ob-slide {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: white;
  }
  .ob-slide.active { display: flex; }
  .ob-slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
    user-select: none;
    pointer-events: none;
  }
  .ob-nav {
    width: 375px;
    height: 34px;
    flex-shrink: 0;
    background: rgba(0,0,0,0.24);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
  }
  .ob-arrow {
    width: 22px;
    height: 22px;
    border: none;
    background: transparent;
    color: white;
    font-size: 18px;
    font-weight: 600;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    opacity: 1;
  }
  .ob-arrow:disabled { opacity: 0.3; }
  .ob-dots {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex: 1;
    padding: 0 8px;
  }
  .ob-dot {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ob-dot-inner {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transition: background 0.2s;
  }
  .ob-dot.active .ob-dot-inner {
    background: rgba(255,255,255,1);
  }

</style>
</head>
<body>

<div class="phone" id="phone">

  <!-- Scrollable article content -->
  <div class="article-content" id="article-content">

    <!-- Top of article -->
    <div class="article-img">
      <img src="assets/shoppernetwork-assets/website/AT/kurier/top.png" alt="" id="top-img">
    </div>

    <!-- Carousel box (embedded ad) -->
    <div class="carousel-box">
      <div class="carousel-rectangular" id="carousel-rect">
        <div class="carousel-track" id="carousel-track">
          <div class="carousel-slide">
            <img src="uploads/image-1.png" alt="Flyer page 1">
          </div>
          <div class="carousel-slide">
            <img src="uploads/image-2.png" alt="Flyer page 2">
          </div>
          <div class="carousel-slide">
            <img src="uploads/image-3.png" alt="Flyer page 3">
          </div>
          <div class="carousel-slide">
            <img src="uploads/image-4.png" alt="Flyer page 4">
          </div>
        </div>
        <!-- Slider / dots -->
        <div class="carousel-slider" id="carousel-slider">
        </div>
      </div>
    </div>

    <!-- Bottom of article -->
    <div class="article-img">
      <img src="assets/shoppernetwork-assets/website/AT/kurier/bottom.png" alt="" id="bottom-img">
    </div>

  </div>


</div>

<script>
// ── PUBLISHER DOMAINS ─────────────────────────────────────────────
var PUBLISHER_DOMAINS = {
  kurier:'kurier.at', laola:'laola1.at', meinbezirk:'meinbezirk.at',
  news:'news.com.au', nine:'nine.com.au', SMH:'smh.com.au', taste:'taste.com.au', yahoo:'au.yahoo.com',
  '24chasa':'24chasa.bg', btvnovinite:'btvnovinite.bg', nova:'nova.bg',
  bild:'bild.de', einfachTasty:'einfachtasty.de', merkur:'merkur.de',
  '20minutos':'20minutos.es', 'elEspa\u00f1ol':'elespanol.com', marca:'marca.com', milAnuncios:'milanuncios.com', xataka:'xataka.com',
  leMonde:'lemonde.fr', lequipe:'lequipe.fr', marieClaire:'marieclaire.fr', parents:'parents.fr', sudOuest:'sudouest.fr',
  '24':'24.hu', hvg:'hvg.hu', index:'index.hu',
  ansa:'ansa.it', momentoCasa:'momentocasa.it', myPersonalTrainer:'mypersonaltrainer.it', salvatoreAranzulla:'aranzulla.it', sienaFree:'sienafree.it',
  algemeenDagblad:'ad.nl', deTelegraf:'telegraaf.nl', nu:'nu.nl', omroepStichting:'nos.nl',
  plejada:'plejada.pl', rmf:'rmf24.pl', WPabczdrowie:'abczdrowie.pl',
  aBola:'abola.pt', correioDaManha:'cmjornal.pt', noticiasAoMinuto:'noticiasaominuto.com', olx:'olx.pt', sapo:'sapo.pt',
  a1:'a1.ro', deparinti:'deparinti.ro', observatorNews:'observatornews.ro'
};

// ── CAROUSEL INIT ─────────────────────────────────────────────────
function initCarousel() {
  var track = document.getElementById('carousel-track');
  var slider = document.getElementById('carousel-slider');
  if (!track) return;
  var slides = track.querySelectorAll('.carousel-slide');
  var totalSlides = slides.length;
  if (totalSlides === 0) return;
  var currentSlide = 0;

  var SLIDE_OFFSETS = [0];
  for (var i = 1; i < totalSlides; i++) {
    SLIDE_OFFSETS.push(SLIDE_OFFSETS[i - 1] + (i === 1 ? 388 : 351));
  }

  slider.innerHTML = '';
  for (var i = 0; i < totalSlides; i++) {
    var dot = document.createElement('div');
    dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
    slider.appendChild(dot);
  }

  function updateDots() {
    var dots = slider.querySelectorAll('.carousel-dot');
    for (var i = 0; i < dots.length; i++) {
      dots[i].classList.toggle('active', i === currentSlide);
    }
  }

  function snapToSlide() {
    track.style.transition = 'transform 0.35s ease';
    track.style.transform = 'translateX(-' + SLIDE_OFFSETS[currentSlide] + 'px)';
    updateDots();
  }

  var isDragging = false, startX = 0, dragOffset = 0;

  function onStart(x) { isDragging = true; startX = x; dragOffset = 0; track.style.transition = 'none'; }
  function onMove(x) { if (!isDragging) return; dragOffset = x - startX; track.style.transform = 'translateX(' + (-SLIDE_OFFSETS[currentSlide] + dragOffset) + 'px)'; }
  function onEnd() { if (!isDragging) return; isDragging = false; if (dragOffset < -40 && currentSlide < totalSlides - 1) currentSlide++; else if (dragOffset > 40 && currentSlide > 0) currentSlide--; snapToSlide(); }

  track.addEventListener('touchstart', function (e) { onStart(e.touches[0].clientX); }, { passive: true });
  track.addEventListener('touchmove', function (e) { onMove(e.touches[0].clientX); }, { passive: true });
  track.addEventListener('touchend', onEnd);
  track.addEventListener('mousedown', function (e) { onStart(e.clientX); e.preventDefault(); });
  window.addEventListener('mousemove', function (e) { onMove(e.clientX); });
  window.addEventListener('mouseup', onEnd);

  snapToSlide();
}

// ── PDF.js worker setup ──────────────────────────────────────────────
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// ── Render a single PDF page to a canvas, return as an img element ──
// resolveURL loaded from js/core/utils.js

function renderPdfPage(page, slideWidth) {
  var viewport = page.getViewport({ scale: 1 });
  var scale = slideWidth / viewport.width;
  var scaledViewport = page.getViewport({ scale: scale });

  var canvas = document.createElement('canvas');
  canvas.width = scaledViewport.width;
  canvas.height = scaledViewport.height;

  return page.render({
    canvasContext: canvas.getContext('2d'),
    viewport: scaledViewport
  }).promise.then(function () {
    var img = document.createElement('img');
    img.src = canvas.toDataURL('image/png');
    img.alt = 'PDF page';
    img.draggable = false;
    return img;
  });
}

// ── Render all pages of a PDF into carousel slides ──────────────────
function renderPdfSlides(pdfUrl, track, slideWidth) {
  return pdfjsLib.getDocument(pdfUrl).promise.then(function (pdf) {
    var pages = [];
    for (var p = 1; p <= pdf.numPages; p++) {
      pages.push(p);
    }
    return pages.reduce(function (chain, pageNum) {
      return chain.then(function () {
        return pdf.getPage(pageNum).then(function (page) {
          return renderPdfPage(page, slideWidth).then(function (img) {
            var slide = document.createElement('div');
            slide.className = 'carousel-slide';
            slide.appendChild(img);
            track.appendChild(slide);
          });
        });
      });
    }, Promise.resolve());
  });
}

// ── Check if a URL is a PDF ─────────────────────────────────────────
function isPdfUrl(url) {
  return url.toLowerCase().endsWith('.pdf');
}

// ── OUTBRAIN EXPERIENCE ───────────────────────────────────────────
function buildOutbrainBox(images) {
  var container = document.createElement('div');
  container.className = 'ob-container';

  var slidesArea = document.createElement('div');
  slidesArea.className = 'ob-slides-area';

  images.forEach(function(src, i) {
    var slide = document.createElement('div');
    slide.className = 'ob-slide' + (i === 0 ? ' active' : '');
    var img = document.createElement('img');
    img.src = src;
    img.alt = 'Page ' + (i + 1);
    img.draggable = false;
    slide.appendChild(img);
    slidesArea.appendChild(slide);
  });
  container.appendChild(slidesArea);

  var nav = document.createElement('div');
  nav.className = 'ob-nav';

  var btnPrev = document.createElement('button');
  btnPrev.className = 'ob-arrow';
  btnPrev.textContent = '\u2039';
  btnPrev.disabled = true;

  var dotsWrap = document.createElement('div');
  dotsWrap.className = 'ob-dots';
  images.forEach(function(_, i) {
    var dot = document.createElement('div');
    dot.className = 'ob-dot' + (i === 0 ? ' active' : '');
    var inner = document.createElement('div');
    inner.className = 'ob-dot-inner';
    dot.appendChild(inner);
    dotsWrap.appendChild(dot);
  });

  var btnNext = document.createElement('button');
  btnNext.className = 'ob-arrow';
  btnNext.textContent = '\u203A';
  if (images.length <= 1) btnNext.disabled = true;

  nav.appendChild(btnPrev);
  nav.appendChild(dotsWrap);
  nav.appendChild(btnNext);
  container.appendChild(nav);

  var current = 0;
  var total = images.length;
  var slides = slidesArea.querySelectorAll('.ob-slide');
  var dots = dotsWrap.querySelectorAll('.ob-dot');

  function goTo(idx) {
    if (idx < 0 || idx >= total) return;
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = idx;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
    btnPrev.disabled = current === 0;
    btnNext.disabled = current === total - 1;
  }

  btnPrev.addEventListener('click', function() { goTo(current - 1); });
  btnNext.addEventListener('click', function() { goTo(current + 1); });

  var txStart = 0;
  slidesArea.addEventListener('touchstart', function(e) {
    txStart = e.touches[0].clientX;
  }, { passive: true });
  slidesArea.addEventListener('touchend', function(e) {
    var diff = txStart - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) {
      if (diff > 0) goTo(current + 1);
      else goTo(current - 1);
    }
  }, { passive: true });

  var mxStart = 0;
  var dragging = false;
  slidesArea.addEventListener('mousedown', function(e) {
    mxStart = e.clientX;
    dragging = true;
  });
  window.addEventListener('mouseup', function(e) {
    if (!dragging) return;
    dragging = false;
    var diff = mxStart - e.clientX;
    if (Math.abs(diff) > 40) {
      if (diff > 0) goTo(current + 1);
      else goTo(current - 1);
    }
  });

  return container;
}

// ── RENDER CAROUSEL BOX BY EXPERIENCE ────────────────────────────
function renderCarouselBox(imageUrls, experience) {
  var box = document.querySelector('.carousel-box');
  if (!box) return;

  if (experience === 'outbrain') {
    // Clear existing YOC content
    box.innerHTML = '';
    var obBox = buildOutbrainBox(imageUrls);
    box.appendChild(obBox);
  } else {
    // YOC: build slides in existing track, then init carousel
    var track = document.getElementById('carousel-track');
    track.innerHTML = '';
    imageUrls.forEach(function(src) {
      var slide = document.createElement('div');
      slide.className = 'carousel-slide';
      var img = document.createElement('img');
      img.src = src;
      img.alt = 'Flyer page';
      img.draggable = false;
      slide.appendChild(img);
      track.appendChild(slide);
    });
    initCarousel();
  }
}

// ── DYNAMIC LOADING ───────────────────────────────────────────────
(function () {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  var experience = (params.get('experience') || 'yoc').toLowerCase();

  if (id) {
    fetch('api/get.php?id=' + encodeURIComponent(id))
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (!data) return initCarousel();

        // Use experience from data if not in URL, fallback to 'yoc'
        if (!params.get('experience') && data.experience) {
          experience = data.experience.toLowerCase();
        }

        var loc = data.location || 'AT';
        var pub = data.publisher || 'kurier';
        var basePath = 'assets/shoppernetwork-assets/website/' + loc + '/' + pub + '/';

        document.getElementById('top-img').src = basePath + 'top.png';
        document.getElementById('bottom-img').src = basePath + 'bottom.png';

        // Collect image/PDF URLs from image1..image9
        var urls = [];
        for (var i = 1; i <= 9; i++) {
          var url = data['image' + i];
          if (url && url.trim()) urls.push(resolveURL(url.trim()));
        }

        if (urls.length > 0) {
          if (experience === 'outbrain') {
            // Outbrain: expand PDFs first, then render
            var allImages = [];
            var chain = Promise.resolve();
            urls.forEach(function(url) {
              chain = chain.then(function() {
                if (isPdfUrl(url) && window.pdfjsLib) {
                  return pdfjsLib.getDocument(url).promise.then(function(pdf) {
                    var pages = [];
                    for (var p = 1; p <= pdf.numPages; p++) pages.push(p);
                    return pages.reduce(function(c, pageNum) {
                      return c.then(function() {
                        return pdf.getPage(pageNum).then(function(page) {
                          return renderPdfPage(page, 375).then(function(img) {
                            allImages.push(img.src);
                          });
                        });
                      });
                    }, Promise.resolve());
                  });
                } else {
                  allImages.push(url);
                  return Promise.resolve();
                }
              });
            });
            chain.then(function() {
              renderCarouselBox(allImages, 'outbrain');
            });
          } else {
            // YOC: process PDFs into track slides, then init
            var track = document.getElementById('carousel-track');
            track.innerHTML = '';
            var slideWidth = 375;

            var chain = Promise.resolve();
            urls.forEach(function (url) {
              chain = chain.then(function () {
                if (isPdfUrl(url) && window.pdfjsLib) {
                  return renderPdfSlides(url, track, slideWidth);
                } else {
                  var slide = document.createElement('div');
                  slide.className = 'carousel-slide';
                  var img = document.createElement('img');
                  img.src = url;
                  img.alt = 'Flyer page';
                  img.draggable = false;
                  slide.appendChild(img);
                  track.appendChild(slide);
                  return Promise.resolve();
                }
              });
            });

            chain.then(function () {
              initCarousel();
            });
          }
        } else {
          initCarousel();
        }
      })
      .catch(function () {
        initCarousel();
      });
  } else {
    initCarousel();
  }
})();
</script>

<script src="js/core/zoom.js"></script>
<script>
applyZoom({ designW: 375, scrollable: true });
/* ShopperNetwork scrolls naturally — never lock overflow */
document.body.style.overflow = 'visible';
document.documentElement.style.overflow = 'auto';
</script>
</body>
