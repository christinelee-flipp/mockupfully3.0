<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1.0">
<title>Click2Go Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
  }

  body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    background: #e5e5e5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: 'Montserrat', sans-serif;
  }

  #viewer-container {
    position: relative;
    width: 100%;
    max-width: 380px;
    height: 100dvh;
    overflow: hidden;
    background: #fff;
    flex-shrink: 0;
  }

  @media (hover: none) and (pointer: coarse) {
    #viewer-container { max-width: 780px; }
  }

  /* ── LOADING ── */
  .loading {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: #f5f5f5;
    z-index: 5;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #ddd;
    border-top-color: #555;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 13px; color: #666; }

  /* ── ERROR ── */
  .error-screen {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px; padding: 32px;
    background: #f5f5f5;
    z-index: 5;
  }
  .error-screen h2 { font-size: 18px; color: #333; font-weight: 600; }
  .error-screen p  { font-size: 13px; color: #666; text-align: center; line-height: 1.5; }

  /* ── SECTIONS (hidden by default) ── */
  .section { display: none; }

  /* ── WEBSITE VIEW ── */
  #website-view {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: none;
  }
  #website-view img {
    width: 100%;
    display: block;
    margin: 0;
    padding: 0;
  }

  /* ── MARKETPLACE: SCREEN 1 — App Home ── */
  #market-home {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    min-height: 100dvh;
    flex-direction: column;
    background: #fff;
    overflow: hidden;
  }
  .mh-header {
    flex-shrink: 0;
  }
  .mh-header img { width: 100%; display: block; }
  .mh-scroll {
    flex: 1;
    min-height: 200px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mh-content {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding: 8px;
  }
  .mh-flyer {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: calc(50% - 8px);
    cursor: pointer;
  }
  .mh-flyer img {
    width: 100%;
    display: block;
  }
  .mh-cover-home {
    width: 100%;
    min-height: 240px;
    background-color: #ebebf5;
    background-position: center;
    background-size: contain;
    background-repeat: no-repeat;
  }
  .mh-flyer-img {
    width: calc(50% - 8px);
  }
  .mh-flyer-img img {
    width: 100%;
    display: block;
  }
  .mh-footer {
    flex-shrink: 0;
  }
  .mh-footer img { width: 100%; display: block; }

  /* ── MARKETPLACE: SCREEN 2 — Flyer Viewer ── */
  #market-viewer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    min-height: 100dvh;
    flex-direction: column;
    background: #282832;
    overflow: hidden;
  }
  .mv-header {
    flex-shrink: 0;
  }
  .mv-header img { width: 100%; display: block; }
  .mv-info-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
  }
  .mv-info-badge {
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .mv-swiper {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .mv-swiper .swiper { width: 100%; height: 100%; }
  .mv-slide {
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #282832;
  }
  .mv-footer {
    flex-shrink: 0;
    cursor: pointer;
  }
  .mv-footer img { width: 100%; display: block; }

  /* ── AD CONTAINER (inline, no iframe) ── */
  #ad-container {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── AD: Phone wrapper ── */
  .ad-phone {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-family: 'Montserrat', sans-serif;
  }

  /* ── AD: Status bar ── */
  .ad-status-bar {
    height: 54px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 0;
  }
  .ad-status-time {
    font-family: 'SF Pro Text', 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 16px;
  }
  .ad-status-icons { display: flex; align-items: center; gap: 2px; }
  .ad-signal {
    display: flex;
    align-items: flex-end;
    gap: 1.5px;
    height: 12px;
    margin-right: 2px;
  }
  .ad-signal span { border-radius: 1px; width: 3px; }

  /* ── AD: Top bar ── */
  .ad-top-bar {
    height: 72px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
  }
  .ad-close-btn {
    width: 38px; height: 38px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* ── AD: Content area ── */
  .ad-content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }

  /* Banner layout */
  .ad-banner-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    flex-shrink: 0;
    overflow: hidden;
    padding-top: 8px;
  }
  .ad-logo-area {
    width: 334px;
    height: 112px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .ad-logo-area img {
    max-width: 334px;
    max-height: 112px;
    width: auto; height: auto;
    object-fit: contain;
  }
  .ad-image-area {
    width: 100%;
    aspect-ratio: 1;
    flex-shrink: 0;
    overflow: hidden;
  }
  .ad-image-area img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* Carousel layout — position relative container */
  .ad-carousel-layout {
    flex: 1;
    position: relative;
    min-height: 0;
    overflow: hidden;
    width: 100%;
  }

  /* Left text + logo column */
  .ad-carousel-left {
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    width: calc(100% - 184px);
    padding-left: 24px;
    padding-right: 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    justify-content: center;
  }

  /* Logo area — inside left column */
  .ad-col-logo-wrap {
    width: 100%;
    height: 80px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .ad-col-logo {
    max-width: 100%;
    max-height: 80px;
    width: auto;
    height: auto;
    object-fit: contain;
    object-position: left center;
    display: block;
  }

  /* Claim text */
  .ad-claim-text {
    font-weight: 500;
    font-size: 26px;
    line-height: 40px;
    letter-spacing: -0.24px;
  }

  /* Card column — absolutely positioned right */
  .ad-card-column {
    position: absolute;
    top: 0;
    right: 24px;
    width: 160px;
    overflow: hidden;
  }
  .ad-card-column--vertical { height: 504px; }
  .ad-card-column--square   { height: 604px; }

  /* Card track */
  .ad-card-track {
    display: flex;
    flex-direction: column;
    transition: transform 600ms ease-in-out;
    will-change: transform;
  }
  .ad-card-track--vertical { gap: 24px; padding-top: 8px; }
  .ad-card-track--square   { gap: 0px; }
  .ad-card-track.no-transition { transition: none; }

  /* Product card — vertical */
  .ad-product-card {
    width: 160px;
    flex-shrink: 0;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .ad-product-card--vertical {
    height: 240px;
  }
  .ad-card-img-wrap--vertical {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    border-radius: 8px 8px 0 0;
  }
  .ad-card-img-wrap--vertical img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .ad-product-card--vertical .ad-card-bottom {
    flex-shrink: 0;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px;
  }

  /* Product card — square */
  .ad-product-card--square {
    height: 206px;
  }
  .ad-card-img-wrap--square {
    width: 160px;
    height: 160px;
    flex-shrink: 0;
    border-radius: 8px;
    overflow: hidden;
  }
  .ad-card-img-wrap--square img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .ad-product-card--square .ad-card-bottom {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px;
  }

  /* Card image wrap — shared */
  .ad-card-img-wrap {
    overflow: hidden;
    pointer-events: none;
  }

  /* Card bottom bar — shared defaults */
  .ad-card-bottom {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px;
  }
  .ad-card-prod-name {
    flex: 1;
    min-width: 0;
    font-weight: 600;
    font-size: 10px;
    line-height: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ad-card-vedi {
    flex-shrink: 0;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.1px;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 2px 4px 4px;
    line-height: 1;
    cursor: pointer;
    white-space: nowrap;
  }

  /* CTA area */
  .ad-cta-area {
    height: 73px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ad-cta-button {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 14px;
    line-height: 1;
    border-radius: 12px;
    padding: 12px 24px;
    border: 1px solid transparent;
    cursor: pointer;
    outline: none;
  }

  /* Safari footer */
  .ad-safari-footer {
    height: 128px;
    background: #f7f7f7;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding-top: 8px;
  }
  .ad-safari-bar {
    width: 90%;
    height: 42px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 12px 0 rgba(0,0,0,0.13);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    flex-shrink: 0;
  }
  .ad-safari-bar-aa {
    font-family: 'SF Pro Text', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    width: 24px;
    text-align: center;
  }
  .ad-safari-bar-url {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    justify-content: center;
    overflow: hidden;
  }
  .ad-safari-bar-url span {
    font-family: 'SF Pro Display', sans-serif;
    font-size: 15px;
    color: #202124;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ad-safari-nav {
    width: 95%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    padding: 0 2px;
  }
  .ad-safari-nav svg { width: 24px; height: 24px; display: block; }
</style>
</head>
<body>
<div id="viewer-container">

  <!-- LOADING -->
  <div class="loading" id="state-loading">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <!-- ERROR -->
  <div class="error-screen" id="state-error">
    <h2>Error</h2>
    <p id="error-msg">Could not load campaign.</p>
  </div>

  <!-- WEBSITE -->
  <div class="section" id="website-view"></div>

  <!-- MARKETPLACE: HOME -->
  <div class="section" id="market-home"></div>

  <!-- MARKETPLACE: VIEWER -->
  <div class="section" id="market-viewer"></div>

  <!-- AD (rendered inline, no iframe) -->
  <div class="section" id="ad-container"></div>

</div><!-- /viewer-container -->

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
// Expose campaignData globally so click2go-pass2.js can use window._campaignData
var campaignData = null;

(function () {
  'use strict';

  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  var viewer = params.get('viewer');

  var swiperInstance = null;
  var adScrollTimer = null;

  // ── CTA labels ──
  var CTA_LABELS = {
    IT: 'Trova lo store',
    ES: 'Encuentra la tienda',
    FR: 'Trouver le magasin',
    DE: 'Store finden',
    PT: 'Encontrar a loja'
  };

  // ── Helpers ──
  function showError(msg) {
    document.getElementById('state-loading').style.display = 'none';
    var el = document.getElementById('state-error');
    el.style.display = 'flex';
    document.getElementById('error-msg').textContent = msg;
  }

  function showSection(id) {
    var el = document.getElementById(id);
    el.style.display = (id === 'website-view') ? 'block' : 'flex';
  }

  function hideSection(id) {
    var el = document.getElementById(id);
    el.style.display = 'none';
  }

  function hideLoading() {
    document.getElementById('state-loading').style.display = 'none';
  }

  function assetBase() {
    return 'assets/click2go-assets/';
  }

  function isDark(hex) {
    if (!hex || !hex.startsWith('#')) return false;
    var c = hex.replace('#', '');
    var r = parseInt(c.slice(0,2),16), g = parseInt(c.slice(2,4),16), b = parseInt(c.slice(4,6),16);
    return (r*0.299 + g*0.587 + b*0.114) < 128;
  }

  function buildBg(d) {
    if (d.globalBkgType === 'gradient' && d.globalBkgTop && d.globalBkgBottom) {
      return 'linear-gradient(to bottom, ' + d.globalBkgTop + ', ' + d.globalBkgBottom + ')';
    }
    return d.globalBkgColor || '#EBEBF5';
  }

  // ── Ad: show / hide ──
  function showAd() {
    if (!campaignData) return;
    renderAd(campaignData);
    hideSection('website-view');
    hideSection('market-home');
    hideSection('market-viewer');
    var adEl = document.getElementById('ad-container');
    adEl.style.display = 'flex';
  }

  function hideAd() {
    if (adScrollTimer) { clearTimeout(adScrollTimer); adScrollTimer = null; }
    var adEl = document.getElementById('ad-container');
    adEl.style.display = 'none';
    adEl.innerHTML = '';
    if (viewer === 'marketplace') {
      showSection('market-viewer');
    } else {
      var wsEl = document.getElementById('website-view');
      wsEl.style.cssText = 'display:block;width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;';
    }
  }

  // ── renderAd ──
  function renderAd(d) {
    var container = document.getElementById('ad-container');
    container.innerHTML = '';
    if (adScrollTimer) { clearTimeout(adScrollTimer); adScrollTimer = null; }

    var bg = buildBg(d);
    var topHex = d.globalBkgType === 'gradient' ? (d.globalBkgTop || '#000') : (d.globalBkgColor || '#fff');
    var iconColor = isDark(topHex) ? '#ffffff' : '#000000';
    var loc = (d.location || '').toUpperCase();
    var ctaLabel = CTA_LABELS[loc] || 'Find the store';
    var type = (d.templateType || '').toLowerCase();

    // Store data globally for click2go-pass2.js
    window._campaignData = d;

    // Phone wrapper
    var phone = document.createElement('div');
    phone.className = 'ad-phone';
    phone.id = 'phone'; // pass2.js uses getElementById('phone')
    phone.style.background = bg;

    // Status bar
    var statusBar = document.createElement('div');
    statusBar.className = 'ad-status-bar';
    statusBar.style.background = 'transparent';
    statusBar.innerHTML =
      '<span class="ad-status-time" style="color:' + iconColor + '">10:10</span>' +
      '<div class="ad-status-icons">' +
        '<div class="ad-signal"><span style="height:4px;background:' + iconColor + ';display:block"></span><span style="height:6px;background:' + iconColor + ';display:block"></span><span style="height:9px;background:' + iconColor + ';display:block"></span><span style="height:12px;background:' + iconColor + ';display:block"></span></div>' +
        '<svg width="16" height="12" viewBox="0 0 16 12" fill="none" style="margin-right:2px"><path d="M8 9.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z" fill="' + iconColor + '"/><path d="M4.1 7.1C5.1 6.1 6.5 5.5 8 5.5s2.9.6 3.9 1.6" stroke="' + iconColor + '" stroke-width="1.5" stroke-linecap="round" fill="none"/><path d="M1.3 4.3C3 2.6 5.4 1.5 8 1.5s5 1.1 6.7 2.8" stroke="' + iconColor + '" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>' +
        '<div style="width:28px;height:14px;border:1.5px solid ' + iconColor + ';border-radius:3px;position:relative"><div style="position:absolute;top:1px;left:1px;bottom:1px;width:70%;background:' + iconColor + ';border-radius:1px"></div></div>' +
      '</div>';
    phone.appendChild(statusBar);

    // Top bar
    var topBar = document.createElement('div');
    topBar.className = 'ad-top-bar';
    topBar.style.background = 'transparent';
    topBar.innerHTML =
      '<div style="width:56px;height:56px;flex-shrink:0"></div>' +
      '<div class="ad-close-btn" id="ad-close-btn">' +
        '<svg width="38" height="38" viewBox="0 0 38 38" fill="none">' +
          '<circle cx="19" cy="19" r="18" stroke="' + iconColor + '" stroke-width="1.5"/>' +
          '<path d="M13 13l12 12M25 13L13 25" stroke="' + iconColor + '" stroke-width="1.8" stroke-linecap="round"/>' +
        '</svg>' +
      '</div>';
    phone.appendChild(topBar);

    // Close button handler
    setTimeout(function() {
      var closeBtn = document.getElementById('ad-close-btn');
      if (closeBtn) closeBtn.addEventListener('click', function() { hideAd(); });
    }, 0);

    // Content area
    var contentArea = document.createElement('div');
    contentArea.className = 'ad-content-area';
    contentArea.style.background = 'transparent';

    if (type === 'banner') {
      renderBanner(d, contentArea, iconColor);
    } else if (type === 'carousel_vertical') {
      renderCarousel(d, contentArea, 'vertical');
    } else if (type === 'carousel_square') {
      renderCarousel(d, contentArea, 'square');
    }

    // CTA
    var ctaArea = document.createElement('div');
    ctaArea.className = 'ad-cta-area';
    var ctaBtn = document.createElement('button');
    ctaBtn.className = 'ad-cta-button';
    ctaBtn.textContent = ctaLabel;
    ctaBtn.style.background = d.buttonBkgColor || '#000';
    ctaBtn.style.color = d.buttonTextColor || '#fff';
    ctaBtn.style.borderColor = d.buttonBkgColor || '#000';
    ctaBtn.addEventListener('click', function() {
      if (typeof initPass2 === 'function') initPass2(d);
    });
    ctaArea.appendChild(ctaBtn);
    contentArea.appendChild(ctaArea);

    phone.appendChild(contentArea);

    // Safari footer
    var safariFooter = document.createElement('div');
    safariFooter.className = 'ad-safari-footer';
    var safariUrl = 'designlab.shopfully.com';
    if (d.websiteURL) {
      try { safariUrl = new URL(d.websiteURL.startsWith('http') ? d.websiteURL : 'https://' + d.websiteURL).hostname; } catch(_) {}
    }
    safariFooter.innerHTML =
      '<div class="ad-safari-bar">' +
        '<span class="ad-safari-bar-aa">AA</span>' +
        '<div class="ad-safari-bar-url">' +
          '<svg width="14" height="16" viewBox="0 0 14 16" fill="none"><path d="M3.5 7V5a3.5 3.5 0 017 0v2" stroke="#555" stroke-width="1.3" stroke-linecap="round"/><rect x="1" y="7" width="12" height="8" rx="2" stroke="#555" stroke-width="1.3"/></svg>' +
          '<span>' + safariUrl + '</span>' +
        '</div>' +
        '<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M16 10a6 6 0 11-1.76-4.24" stroke="#555" stroke-width="1.5" stroke-linecap="round"/><path d="M14 5.5l.5 1.5 1.5-.5" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
      '</div>' +
      '<div class="ad-safari-nav">' +
        '<svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="#007AFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '<svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#C7C7CC" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '<svg viewBox="0 0 24 24" fill="none"><path d="M8.5 8.5L12 5l3.5 3.5" stroke="#007AFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 5v10" stroke="#007AFF" stroke-width="1.8" stroke-linecap="round"/><path d="M5 14v4a1 1 0 001 1h12a1 1 0 001-1v-4" stroke="#007AFF" stroke-width="1.8" stroke-linecap="round"/></svg>' +
        '<svg viewBox="0 0 24 24" fill="none"><path d="M5 4h14a1 1 0 011 1v15l-7-4-7 4V5a1 1 0 011-1z" stroke="#007AFF" stroke-width="1.8" stroke-linejoin="round"/></svg>' +
        '<svg viewBox="0 0 24 24" fill="none"><rect x="4" y="7" width="13" height="13" rx="2" stroke="#007AFF" stroke-width="1.8"/><path d="M8 7V5a2 2 0 012-2h9a2 2 0 012 2v11a2 2 0 01-2 2h-2" stroke="#007AFF" stroke-width="1.5"/></svg>' +
      '</div>';
    phone.appendChild(safariFooter);

    container.appendChild(phone);
  }

  // ── Banner renderer ──
  function renderBanner(d, contentArea) {
    var inner = document.createElement('div');
    inner.className = 'ad-banner-inner';

    var logoArea = document.createElement('div');
    logoArea.className = 'ad-logo-area';
    if (d.clientLogoURL) {
      var logoImg = document.createElement('img');
      logoImg.src = d.clientLogoURL;
      logoImg.alt = '';
      logoImg.onerror = function() { logoImg.style.display = 'none'; };
      logoArea.appendChild(logoImg);
    }
    inner.appendChild(logoArea);

    var imgArea = document.createElement('div');
    imgArea.className = 'ad-image-area';
    if (d.bannerURL) {
      var bannerImg = document.createElement('img');
      bannerImg.src = d.bannerURL;
      bannerImg.alt = '';
      bannerImg.onerror = function() { bannerImg.style.opacity = '0'; };
      imgArea.appendChild(bannerImg);
    }
    inner.appendChild(imgArea);
    contentArea.appendChild(inner);
  }

  // ── Carousel renderer (vertical or square) ──
  function renderCarousel(d, contentArea, variant) {
    var isVertical = (variant === 'vertical');
    var CARD_H = isVertical ? 240 : 200;
    var CARD_IMG_H = isVertical ? 176 : 160;
    var CARD_GAP = isVertical ? 24 : 6;
    var CARD_STEP = CARD_H + CARD_GAP;

    var layout = document.createElement('div');
    layout.className = 'ad-carousel-layout';

    // LEFT COLUMN: logo + claim text
    var left = document.createElement('div');
    left.className = 'ad-carousel-left';

    // Logo inside left column
    var logoWrap = document.createElement('div');
    logoWrap.className = 'ad-col-logo-wrap';
    if (d.clientLogoURL) {
      var logo = document.createElement('img');
      logo.className = 'ad-col-logo';
      logo.src = d.clientLogoURL;
      logo.alt = '';
      logo.onerror = function() { logo.style.display = 'none'; };
      logoWrap.appendChild(logo);
    }
    left.appendChild(logoWrap);

    // Claim text
    var claim = document.createElement('div');
    claim.className = 'ad-claim-text';
    claim.style.color = d.globalTextColor || '#000';
    claim.textContent = d.claimText || '';
    left.appendChild(claim);
    layout.appendChild(left);

    // Card column
    var colClass = isVertical ? 'ad-card-column ad-card-column--vertical' : 'ad-card-column ad-card-column--square';
    var col = document.createElement('div');
    col.className = colClass;

    var trackClass = isVertical ? 'ad-card-track ad-card-track--vertical' : 'ad-card-track ad-card-track--square';
    var track = document.createElement('div');
    track.className = trackClass;

    // Collect products
    var products = [];
    for (var i = 1; i <= 3; i++) {
      var pad = ('0' + i).slice(-2);
      var pName = d['Prod' + pad + 'Name'];
      var pImg  = d['Prod' + pad + 'ImageURL'];
      var pLink = d['Prod' + pad + 'LinkURL'];
      if (pImg && pImg.trim()) {
        products.push({ name: pName || '', imageURL: pImg, linkURL: pLink || '' });
      }
    }

    function buildProductCard(prod) {
      var card = document.createElement('div');
      card.className = 'ad-product-card ' + (isVertical ? 'ad-product-card--vertical' : 'ad-product-card--square');

      var cardBg = d.productBkgColor || 'rgba(255,255,255,0.8)';
      if (d.productBkgType === 'gradient' && d.productBkgTop && d.productBkgBottom) {
        cardBg = 'linear-gradient(to bottom, ' + d.productBkgTop + ', ' + d.productBkgBottom + ')';
      }
      card.style.background = cardBg;

      var imgWrap = document.createElement('div');
      imgWrap.className = 'ad-card-img-wrap ' + (isVertical ? 'ad-card-img-wrap--vertical' : 'ad-card-img-wrap--square');
      if (prod.imageURL) {
        var img = document.createElement('img');
        img.src = prod.imageURL;
        img.alt = prod.name;
        img.onerror = function() { imgWrap.style.background = 'rgba(0,0,0,0.06)'; };
        imgWrap.appendChild(img);
      }
      card.appendChild(imgWrap);

      var bottom = document.createElement('div');
      bottom.className = 'ad-card-bottom';
      var nameEl = document.createElement('p');
      nameEl.className = 'ad-card-prod-name';
      nameEl.textContent = prod.name;
      nameEl.style.color = d.productTextColor || '#000';
      bottom.appendChild(nameEl);

      var vedi = document.createElement('div');
      vedi.className = 'ad-card-vedi';
      vedi.textContent = 'Vedi';
      vedi.style.background = d.productCardBtnBkgColor || '#fff';
      vedi.style.color = d.productCardBtnTextColor || '#000';
      vedi.style.borderColor = d.productCardBtnBkgColor || '#000';
      bottom.appendChild(vedi);

      card.appendChild(bottom);

      if (prod.linkURL) {
        card.style.cursor = 'pointer';
        card.addEventListener('click', function() { window.location.href = prod.linkURL; });
      }
      return card;
    }

    // Build cards (doubled for infinite loop)
    var allProducts = products.length > 1 ? products.concat(products) : products;
    allProducts.forEach(function(p) { track.appendChild(buildProductCard(p)); });
    col.appendChild(track);
    layout.appendChild(col);
    contentArea.appendChild(layout);

    // Auto-scroll
    if (products.length > 1) {
      var idx = 0;
      function scrollTo(i, animate) {
        if (!animate) track.classList.add('no-transition');
        track.style.transform = 'translateY(-' + (i * CARD_STEP) + 'px)';
        if (!animate) {
          track.offsetHeight;
          track.classList.remove('no-transition');
        }
      }
      function tick() {
        idx++;
        if (idx >= products.length) {
          scrollTo(idx, true);
          adScrollTimer = setTimeout(function() {
            idx = idx - products.length;
            scrollTo(idx, false);
            adScrollTimer = setTimeout(tick, 3000);
          }, 650);
        } else {
          scrollTo(idx, true);
          adScrollTimer = setTimeout(tick, 3000);
        }
      }
      adScrollTimer = setTimeout(tick, 2500);
    }
  }

  // ── Website flow ──
  function initWebsite(d) {
    var loc = (d.location || 'IT').toUpperCase();
    var pub = d.website || 'ansa';
    var base = assetBase() + 'website/' + loc + '/' + pub + '/';

    var container = document.getElementById('website-view');

    var topImg = document.createElement('img');
    topImg.src = base + 'top.png';
    topImg.alt = '';
    topImg.style.cssText = 'width:100%;display:block;margin:0;padding:0;';
    topImg.onerror = function() { console.error('404:', topImg.src); };
    topImg.onload  = function() { console.log('OK:',  topImg.src); };
    container.appendChild(topImg);

    var bottomImg = document.createElement('img');
    bottomImg.src = base + 'bottom.png';
    bottomImg.alt = '';
    bottomImg.style.cssText = 'width:100%;display:block;margin:0;padding:0;';
    bottomImg.onerror = function() { console.error('404:', bottomImg.src); };
    bottomImg.onload  = function() { console.log('OK:',  bottomImg.src); };
    container.appendChild(bottomImg);

    hideLoading();
    var wsEl = document.getElementById('website-view');
    wsEl.style.cssText = 'display:block;width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;';

    console.log('initWebsite complete, path base was:', base);

    setTimeout(function () { showAd(); }, 9000);
  }

  // ── Marketplace flow ──
  function initMarketplace(d) {
    var loc = (d.location || 'IT').toUpperCase();
    var cat = d.marketplace;
    if (!cat || cat.trim() === '') {
      console.warn('marketplace field is empty, falling back to coles');
      cat = 'coles';
    }
    console.log('initMarketplace:', loc, cat);

    var appBase = assetBase() + 'app/' + loc + '/';
    var catBase = assetBase() + 'catalogs/' + loc + '/' + cat + '/';
    console.log('appBase:', appBase);
    console.log('catBase:', catBase);

    buildScreen1(appBase, catBase);
    hideLoading();

    var mh = document.getElementById('market-home');
    console.log('market-home children before show:', mh.children.length);

    showSection('market-home');

    console.log('market-home display after show:', mh.style.display);
    console.log('market-home offsetHeight:', mh.offsetHeight);
  }

  function buildScreen1(appBase, catBase) {
    var container = document.getElementById('market-home');

    var header = document.createElement('div');
    header.className = 'mh-header';
    var headerImg = document.createElement('img');
    headerImg.src = appBase + 'headerHome.png';
    headerImg.alt = '';
    headerImg.onerror = function() { console.error('Missing app asset:', headerImg.src); };
    headerImg.onload = function() { console.log('App asset OK:', headerImg.src); };
    header.appendChild(headerImg);
    container.appendChild(header);

    var scroll = document.createElement('div');
    scroll.className = 'mh-scroll';
    var content = document.createElement('div');
    content.className = 'mh-content';

    var cover = document.createElement('div');
    cover.className = 'mh-flyer';
    cover.addEventListener('click', function () {
      hideSection('market-home');
      buildScreen2(appBase, catBase);
      showSection('market-viewer');
    });

    var coverImg = document.createElement('div');
    coverImg.className = 'mh-cover-home';
    coverImg.style.backgroundImage = 'url(' + catBase + '1.png)';
    cover.appendChild(coverImg);

    var footerFlyerImg = document.createElement('img');
    footerFlyerImg.src = appBase + 'footerFlyer.png';
    footerFlyerImg.alt = '';
    cover.appendChild(footerFlyerImg);

    content.appendChild(cover);

    for (var i = 1; i <= 3; i++) {
      var flyerWrap = document.createElement('div');
      flyerWrap.className = 'mh-flyer-img';
      var flyerImg = document.createElement('img');
      flyerImg.src = appBase + 'flyer0' + i + '.png';
      flyerImg.alt = '';
      flyerWrap.appendChild(flyerImg);
      content.appendChild(flyerWrap);
    }

    scroll.appendChild(content);
    container.appendChild(scroll);

    var footer = document.createElement('div');
    footer.className = 'mh-footer';
    var footerImg = document.createElement('img');
    footerImg.src = appBase + 'footerHome.png';
    footerImg.alt = '';
    footer.appendChild(footerImg);
    container.appendChild(footer);
  }

  var screen2Built = false;

  var PAGE_FORMAT = { IT: 'di', ES: 'de', FR: 'sur', DE: 'von', PT: 'de' };
  function pageLabel(current, total) {
    var loc = campaignData ? (campaignData.location || '').toUpperCase() : '';
    var word = PAGE_FORMAT[loc] || 'of';
    return current + ' ' + word + ' ' + total;
  }

  function buildScreen2(appBase, catBase) {
    if (screen2Built) return;
    screen2Built = true;

    var container = document.getElementById('market-viewer');

    var header = document.createElement('div');
    header.className = 'mv-header';
    var headerImg = document.createElement('img');
    headerImg.src = appBase + 'headerViewer.png';
    headerImg.alt = '';
    header.appendChild(headerImg);
    container.appendChild(header);

    var infoBar = document.createElement('div');
    infoBar.className = 'mv-info-bar';
    var pageBadge = document.createElement('div');
    pageBadge.className = 'mv-info-badge';
    pageBadge.id = 'page-badge';
    pageBadge.textContent = pageLabel(1, 3);
    infoBar.appendChild(pageBadge);
    var validBadge = document.createElement('div');
    validBadge.className = 'mv-info-badge';
    validBadge.textContent = 'V\u00e1lido hasta el martes';
    infoBar.appendChild(validBadge);
    container.appendChild(infoBar);

    var swiperWrap = document.createElement('div');
    swiperWrap.className = 'mv-swiper';
    var swiperEl = document.createElement('div');
    swiperEl.className = 'swiper';
    var wrapper = document.createElement('div');
    wrapper.className = 'swiper-wrapper';

    for (var i = 1; i <= 3; i++) {
      var slide = document.createElement('div');
      slide.className = 'swiper-slide mv-slide';
      slide.style.backgroundImage = 'url(' + catBase + i + '.png)';
      wrapper.appendChild(slide);
    }

    swiperEl.appendChild(wrapper);
    swiperWrap.appendChild(swiperEl);
    container.appendChild(swiperWrap);

    var footer = document.createElement('div');
    footer.className = 'mv-footer';
    var footerImg = document.createElement('img');
    footerImg.src = appBase + 'footerViewer.png';
    footerImg.alt = '';
    footer.appendChild(footerImg);
    footer.addEventListener('click', function () { showAd(); });
    container.appendChild(footer);

    var reachedEnd = false;
    swiperInstance = new Swiper(swiperEl, {
      slidesPerView: 1,
      spaceBetween: 0,
      resistanceRatio: 0.65,
      on: {
        slideChange: function (sw) {
          document.getElementById('page-badge').textContent =
            pageLabel(sw.activeIndex + 1, 3);
          if (sw.activeIndex < 2) reachedEnd = false;
        },
        reachEnd: function () { reachedEnd = true; },
        touchEnd: function (sw) {
          if (reachedEnd && sw.touches.diff < -30) {
            reachedEnd = false;
            showAd();
          }
        }
      }
    });
  }

  // ── Init ──
  async function init() {
    if (!id) { showError('Missing ?id= parameter.'); return; }
    if (!viewer || (viewer !== 'marketplace' && viewer !== 'website')) {
      showError('Missing or invalid ?viewer= parameter.'); return;
    }

    try {
      var res = await fetch('api/get.php?id=' + encodeURIComponent(id));
      if (!res.ok) throw new Error('HTTP ' + res.status);
      campaignData = await res.json();
    } catch (err) {
      console.error('Campaign fetch failed:', err);
      showError('Could not fetch campaign "' + id + '". ' + err.message);
      return;
    }

    if (!campaignData || !campaignData.campaignID) {
      showError('Campaign "' + id + '" was not found.');
      return;
    }

    console.log('Campaign loaded:', campaignData);
    window._campaignData = campaignData;

    if (viewer === 'website') {
      initWebsite(campaignData);
    } else {
      initMarketplace(campaignData);
    }
  }

  // Expose for pass2
  window.showAd = showAd;
  window.hideAd = hideAd;

  init();
})();
</script>
