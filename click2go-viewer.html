<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Click2Go Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
  }

  body {
    width: 100%;
    margin: 0;
    padding: 0;
    background: #e5e5e5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: 'Montserrat', sans-serif;
  }

  #viewer-container {
    width: 390px;
    height: 844px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    transform-origin: top center;
    background: #fff;
  }

  /* ── LOADING ── */
  .loading {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: #f5f5f5;
    z-index: 5;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #ddd;
    border-top-color: #555;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 13px; color: #666; }

  /* ── ERROR ── */
  .error-screen {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px; padding: 32px;
    background: #f5f5f5;
    z-index: 5;
  }
  .error-screen h2 { font-size: 18px; color: #333; font-weight: 600; }
  .error-screen p  { font-size: 13px; color: #666; text-align: center; line-height: 1.5; }

  /* ── SECTIONS (hidden by default) ── */
  .section { display: none; }

  /* ── WEBSITE VIEW ── */
  #website-view {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: none;
  }
  #website-view img {
    width: 100%;
    display: block;
    margin: 0;
    padding: 0;
  }

  /* ── MARKETPLACE: SCREEN 1 — App Home ── */
  #market-home {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    min-height: 100dvh;
    flex-direction: column;
    background: #fff;
    overflow: hidden;
  }
  .mh-header {
    flex-shrink: 0;
  }
  .mh-header img { width: 100%; display: block; }
  .mh-scroll {
    flex: 1;
    min-height: 200px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mh-content {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    padding: 8px;
  }
  .mh-flyer {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: calc(50% - 8px);
    cursor: pointer;
  }
  .mh-flyer img {
    width: 100%;
    display: block;
  }
  .mh-cover-home {
    width: 100%;
    min-height: 240px;
    background-color: #ebebf5;
    background-position: center;
    background-size: contain;
    background-repeat: no-repeat;
  }
  .mh-flyer-img {
    width: calc(50% - 8px);
  }
  .mh-flyer-img img {
    width: 100%;
    display: block;
  }
  .mh-footer {
    flex-shrink: 0;
  }
  .mh-footer img { width: 100%; display: block; }

  /* ── MARKETPLACE: SCREEN 2 — Flyer Viewer ── */
  #market-viewer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    min-height: 100dvh;
    flex-direction: column;
    background: #282832;
    overflow: hidden;
  }
  .mv-header {
    flex-shrink: 0;
  }
  .mv-header img { width: 100%; display: block; }
  .mv-info-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
  }
  .mv-info-badge {
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .mv-swiper {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .mv-swiper .swiper { width: 100%; height: 100%; }
  .mv-slide {
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #282832;
  }
  .mv-footer {
    flex-shrink: 0;
    cursor: pointer;
  }
  .mv-footer img { width: 100%; display: block; }

</style>
</head>
<body>
<div id="viewer-container">

  <!-- LOADING -->
  <div class="loading" id="state-loading">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <!-- ERROR -->
  <div class="error-screen" id="state-error">
    <h2>Error</h2>
    <p id="error-msg">Could not load campaign.</p>
  </div>

  <!-- WEBSITE -->
  <div class="section" id="website-view"></div>

  <!-- MARKETPLACE: HOME -->
  <div class="section" id="market-home"></div>

  <!-- MARKETPLACE: VIEWER -->
  <div class="section" id="market-viewer"></div>


</div><!-- /viewer-container -->

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
var campaignData = null;

(function () {
  'use strict';

  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  var viewer = params.get('viewer');

  var swiperInstance = null;

  // ── Helpers ──
  function showError(msg) {
    document.getElementById('state-loading').style.display = 'none';
    var el = document.getElementById('state-error');
    el.style.display = 'flex';
    document.getElementById('error-msg').textContent = msg;
  }

  function showSection(id) {
    var el = document.getElementById(id);
    el.style.display = (id === 'website-view') ? 'block' : 'flex';
  }

  function hideSection(id) {
    var el = document.getElementById(id);
    el.style.display = 'none';
  }

  function hideLoading() {
    document.getElementById('state-loading').style.display = 'none';
  }

  function assetBase() {
    return 'assets/click2go-assets/';
  }

  // ── Ad: show / hide ──
  function showAd() {
    if (!campaignData) return;
    var type = (campaignData.templateType || '').toLowerCase();
    var templateFile;
    if (type === 'banner') {
      templateFile = 'click2go-banner.html';
    } else if (type === 'carousel_vertical') {
      templateFile = 'click2go-carousel-vertical.html';
    } else if (type === 'carousel_square') {
      templateFile = 'click2go-carousel-square.html';
    } else {
      templateFile = 'click2go-prototype.html';
    }
    window.location.href = templateFile
      + '?id=' + encodeURIComponent(id)
      + '&viewer=' + encodeURIComponent(viewer || '');
  }

  function hideAd() {
    history.back();
  }

  // ── Website flow ──
  function initWebsite(d) {
    var loc = (d.location || 'IT').toUpperCase();
    var pub = d.website || 'ansa';
    var base = assetBase() + 'website/' + loc + '/' + pub + '/';

    var container = document.getElementById('website-view');

    var topImg = document.createElement('img');
    topImg.src = base + 'top.png';
    topImg.alt = '';
    topImg.style.cssText = 'width:100%;display:block;margin:0;padding:0;';
    topImg.onerror = function() { console.error('404:', topImg.src); };
    topImg.onload  = function() { console.log('OK:',  topImg.src); };
    container.appendChild(topImg);

    var bottomImg = document.createElement('img');
    bottomImg.src = base + 'bottom.png';
    bottomImg.alt = '';
    bottomImg.style.cssText = 'width:100%;display:block;margin:0;padding:0;';
    bottomImg.onerror = function() { console.error('404:', bottomImg.src); };
    bottomImg.onload  = function() { console.log('OK:',  bottomImg.src); };
    container.appendChild(bottomImg);

    hideLoading();
    var wsEl = document.getElementById('website-view');
    wsEl.style.cssText = 'display:block;width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;';

    console.log('initWebsite complete, path base was:', base);

    setTimeout(function () { showAd(); }, 9000);
  }

  // ── Marketplace flow ──
  function initMarketplace(d) {
    var loc = (d.location || 'IT').toUpperCase();
    var cat = d.marketplace;
    if (!cat || cat.trim() === '') {
      console.warn('marketplace field is empty, falling back to coles');
      cat = 'coles';
    }
    console.log('initMarketplace:', loc, cat);

    var appBase = assetBase() + 'app/' + loc + '/';
    var catBase = assetBase() + 'catalogs/' + loc + '/' + cat + '/';
    console.log('appBase:', appBase);
    console.log('catBase:', catBase);

    buildScreen1(appBase, catBase);
    hideLoading();

    var mh = document.getElementById('market-home');
    console.log('market-home children before show:', mh.children.length);

    showSection('market-home');

    console.log('market-home display after show:', mh.style.display);
    console.log('market-home offsetHeight:', mh.offsetHeight);
  }

  function buildScreen1(appBase, catBase) {
    var container = document.getElementById('market-home');

    var header = document.createElement('div');
    header.className = 'mh-header';
    var headerImg = document.createElement('img');
    headerImg.src = appBase + 'headerHome.png';
    headerImg.alt = '';
    headerImg.onerror = function() { console.error('Missing app asset:', headerImg.src); };
    headerImg.onload = function() { console.log('App asset OK:', headerImg.src); };
    header.appendChild(headerImg);
    container.appendChild(header);

    var scroll = document.createElement('div');
    scroll.className = 'mh-scroll';
    var content = document.createElement('div');
    content.className = 'mh-content';

    var cover = document.createElement('div');
    cover.className = 'mh-flyer';
    cover.addEventListener('click', function () {
      hideSection('market-home');
      buildScreen2(appBase, catBase);
      showSection('market-viewer');
    });

    var coverImg = document.createElement('div');
    coverImg.className = 'mh-cover-home';
    coverImg.style.backgroundImage = 'url(' + catBase + '1.png)';
    cover.appendChild(coverImg);

    var footerFlyerImg = document.createElement('img');
    footerFlyerImg.src = appBase + 'footerFlyer.png';
    footerFlyerImg.alt = '';
    cover.appendChild(footerFlyerImg);

    content.appendChild(cover);

    for (var i = 1; i <= 3; i++) {
      var flyerWrap = document.createElement('div');
      flyerWrap.className = 'mh-flyer-img';
      var flyerImg = document.createElement('img');
      flyerImg.src = appBase + 'flyer0' + i + '.png';
      flyerImg.alt = '';
      flyerWrap.appendChild(flyerImg);
      content.appendChild(flyerWrap);
    }

    scroll.appendChild(content);
    container.appendChild(scroll);

    var footer = document.createElement('div');
    footer.className = 'mh-footer';
    var footerImg = document.createElement('img');
    footerImg.src = appBase + 'footerHome.png';
    footerImg.alt = '';
    footer.appendChild(footerImg);
    container.appendChild(footer);
  }

  var screen2Built = false;

  var PAGE_FORMAT = { IT: 'di', ES: 'de', FR: 'sur', DE: 'von', PT: 'de' };
  function pageLabel(current, total) {
    var loc = campaignData ? (campaignData.location || '').toUpperCase() : '';
    var word = PAGE_FORMAT[loc] || 'of';
    return current + ' ' + word + ' ' + total;
  }

  function buildScreen2(appBase, catBase) {
    if (screen2Built) return;
    screen2Built = true;

    var container = document.getElementById('market-viewer');

    var header = document.createElement('div');
    header.className = 'mv-header';
    var headerImg = document.createElement('img');
    headerImg.src = appBase + 'headerViewer.png';
    headerImg.alt = '';
    header.appendChild(headerImg);
    container.appendChild(header);

    var infoBar = document.createElement('div');
    infoBar.className = 'mv-info-bar';
    var pageBadge = document.createElement('div');
    pageBadge.className = 'mv-info-badge';
    pageBadge.id = 'page-badge';
    pageBadge.textContent = pageLabel(1, 3);
    infoBar.appendChild(pageBadge);
    var validBadge = document.createElement('div');
    validBadge.className = 'mv-info-badge';
    validBadge.textContent = 'V\u00e1lido hasta el martes';
    infoBar.appendChild(validBadge);
    container.appendChild(infoBar);

    var swiperWrap = document.createElement('div');
    swiperWrap.className = 'mv-swiper';
    var swiperEl = document.createElement('div');
    swiperEl.className = 'swiper';
    var wrapper = document.createElement('div');
    wrapper.className = 'swiper-wrapper';

    for (var i = 1; i <= 3; i++) {
      var slide = document.createElement('div');
      slide.className = 'swiper-slide mv-slide';
      slide.style.backgroundImage = 'url(' + catBase + i + '.png)';
      wrapper.appendChild(slide);
    }

    swiperEl.appendChild(wrapper);
    swiperWrap.appendChild(swiperEl);
    container.appendChild(swiperWrap);

    var footer = document.createElement('div');
    footer.className = 'mv-footer';
    var footerImg = document.createElement('img');
    footerImg.src = appBase + 'footerViewer.png';
    footerImg.alt = '';
    footer.appendChild(footerImg);
    footer.addEventListener('click', function () { showAd(); });
    container.appendChild(footer);

    var reachedEnd = false;
    swiperInstance = new Swiper(swiperEl, {
      slidesPerView: 1,
      spaceBetween: 0,
      resistanceRatio: 0.65,
      on: {
        slideChange: function (sw) {
          document.getElementById('page-badge').textContent =
            pageLabel(sw.activeIndex + 1, 3);
          if (sw.activeIndex < 2) reachedEnd = false;
        },
        reachEnd: function () { reachedEnd = true; },
        touchEnd: function (sw) {
          if (reachedEnd && sw.touches.diff < -30) {
            reachedEnd = false;
            showAd();
          }
        }
      }
    });
  }

  // ── Init ──
  async function init() {
    if (!id) { showError('Missing ?id= parameter.'); return; }
    if (!viewer || (viewer !== 'marketplace' && viewer !== 'website')) {
      showError('Missing or invalid ?viewer= parameter.'); return;
    }

    try {
      var res = await fetch('api/get.php?id=' + encodeURIComponent(id));
      if (!res.ok) throw new Error('HTTP ' + res.status);
      campaignData = await res.json();
    } catch (err) {
      console.error('Campaign fetch failed:', err);
      showError('Could not fetch campaign "' + id + '". ' + err.message);
      return;
    }

    if (!campaignData || !campaignData.campaignID) {
      showError('Campaign "' + id + '" was not found.');
      return;
    }

    console.log('Campaign loaded:', campaignData);

    if (viewer === 'website') {
      initWebsite(campaignData);
    } else {
      initMarketplace(campaignData);
    }
  }

  init();
})();
</script>

<script>
(function () {
  var DESIGN_W = 390;
  var DESIGN_H = 844;
  var MOBILE_BREAKPOINT = 500;

  function scaleViewer() {
    var container = document.getElementById('viewer-container');
    if (!container) return;

    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var isMobile = vw <= MOBILE_BREAKPOINT;

    if (isMobile) {
      var scale = vw / DESIGN_W;
      container.style.transform = 'scale(' + scale + ')';
      container.style.transformOrigin = 'top center';

      var scaledH = Math.round(DESIGN_H * scale);
      document.body.style.minHeight = scaledH + 'px';
      document.body.style.height = 'auto';
      document.body.style.overflow = 'auto';
      document.body.style.background = 'white';
      document.documentElement.style.overflow = 'auto';
      document.documentElement.style.height = 'auto';

    } else {
      var scaleX = vw  / DESIGN_W;
      var scaleY = vh  / DESIGN_H;
      var scale  = Math.min(scaleX, scaleY) * 0.92;
      container.style.transform = 'scale(' + scale + ')';
      container.style.transformOrigin = 'top center';

      document.body.style.minHeight = '100vh';
      document.body.style.height    = '100vh';
      document.body.style.overflow  = 'hidden';
      document.body.style.background = '#e5e5e5';
      document.documentElement.style.overflow = 'hidden';
      document.documentElement.style.height   = '100%';
    }
  }

  scaleViewer();
  window.addEventListener('resize', scaleViewer);
  window.addEventListener('orientationchange', function () {
    setTimeout(scaleViewer, 300);
  });
})();
</script>
</body>
</html>
