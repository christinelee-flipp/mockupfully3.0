<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Click2Go Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
  }

  body {
    background: #e5e5e5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
  }

  /* ── PHONE FRAME ── */
  #phone, .phone {
    width: 390px;
    height: 844px;
    background: white;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  /* ── LOADING ── */
  .loading {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: #f5f5f5;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #ddd;
    border-top-color: #555;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 13px; color: #666; }

  /* ── ERROR ── */
  .error-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 32px;
    background: #f5f5f5;
  }
  .error-screen h2 { font-size: 18px; color: #333; font-weight: 600; }
  .error-screen p  { font-size: 13px; color: #666; text-align: center; line-height: 1.5; }

  /* ── STATUS BAR ── */
  .status-bar {
    height: 54px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 0;
    z-index: 50;
  }
  .status-time {
    font-family: 'SF Pro Text', 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--icon-color, white);
  }
  .status-icons { display: flex; align-items: center; gap: 2px; }
  .signal {
    display: flex;
    align-items: flex-end;
    gap: 1.5px;
    height: 12px;
    margin-right: 2px;
  }
  .signal span { border-radius: 1px; width: 3px; background: var(--icon-color, white); }
  .signal span:nth-child(1) { height: 4px; }
  .signal span:nth-child(2) { height: 6px; }
  .signal span:nth-child(3) { height: 9px; }
  .signal span:nth-child(4) { height: 12px; }
  .battery {
    width: 28px; height: 14px;
    border: 1.5px solid var(--icon-color, white);
    border-radius: 3px;
    position: relative;
  }
  .battery::after {
    content: '';
    position: absolute;
    right: -5px; top: 3px;
    width: 3px; height: 6px;
    background: var(--icon-color, white);
    border-radius: 0 1px 1px 0;
  }
  .battery-fill {
    position: absolute;
    top: 1px; left: 1px; bottom: 1px;
    width: 70%;
    background: var(--icon-color, white);
    border-radius: 1px;
  }

  /* ── TOP BAR ── */
  .top-bar {
    height: 72px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
    z-index: 50;
  }
  .close-btn {
    width: 38px; height: 38px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── AD CONTENT ── */
  .ad-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }

  /* ── AD BODY — one shown at a time ── */
  .ad-body {
    display: none;
    flex: 1;
    flex-direction: column;
    min-height: 0;
  }
  .ad-body.active { display: flex; }

  /* ════════════════════════════════════════════
     BANNER LAYOUT
  ════════════════════════════════════════════ */
  .ad-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    flex-shrink: 0;
    overflow: hidden;
    padding-top: 8px;
  }
  .logo-area {
    width: 334px;
    height: 112px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .logo-area img {
    max-width: 334px;
    max-height: 112px;
    width: auto;
    height: auto;
    object-fit: contain;
  }
  .image-area {
    width: 390px;
    height: 390px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .image-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ════════════════════════════════════════════
     CAROUSEL SHARED
  ════════════════════════════════════════════ */
  .carousel-layout {
    flex: 1;
    display: flex;
    flex-direction: row;
    align-items: center;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }
  .carousel-left {
    width: 220px;
    flex-shrink: 0;
    padding-left: 24px;
    padding-right: 24px;
    display: flex;
    flex-direction: column;
  }
  #ad-body-cv .carousel-left { justify-content: center; }
  #ad-body-cs .carousel-left { justify-content: flex-start; }

  /* ── COL LOGO (carousel vertical) ── */
  .col-logo-wrap {
    position: absolute;
    top: 0;
    left: 24px;
    width: 174px;
    height: 80px;
    display: flex;
    align-items: center;
  }
  .col-logo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: left center;
    display: block;
  }

  /* ── CONTENT LOGO (carousel square) ── */
  .content-logo-wrap {
    position: absolute;
    top: 0;
    left: 24px;
    width: 174px;
    height: 80px;
    display: flex;
    align-items: center;
    z-index: 1;
  }
  .content-logo-wrap img {
    max-height: 80px;
    max-width: 174px;
    width: auto;
    height: auto;
    object-fit: contain;
    display: none;
  }

  /* ── CLAIM TEXT ── */
  .claim-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 26px;
    line-height: 40px;
    letter-spacing: -0.24px;
    color: var(--global-text-color, #000000);
  }
  #ad-body-cs .claim-text {
    margin-top: auto;
    margin-bottom: auto;
  }

  /* ── CARD COLUMN — VERTICAL (160×240, gap 24) ── */
  #card-column-cv {
    width: 160px;
    height: 512px;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }
  #card-track-cv {
    display: flex;
    flex-direction: column;
    gap: 24px;
    transition: transform 600ms ease-in-out;
    will-change: transform;
    padding-top: 8px;
  }
  #card-track-cv.no-transition { transition: none; }
  #card-column-cv .product-card { width: 160px; height: 240px; }
  #card-column-cv .card-img-wrap { height: 176px; }

  /* ── CARD COLUMN — SQUARE (160×200, gap 2) ── */
  #card-column-cs {
    width: 160px;
    height: 604px;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }
  #card-track-cs {
    display: flex;
    flex-direction: column;
    gap: 2px;
    transition: transform 600ms ease-in-out;
    will-change: transform;
  }
  #card-track-cs.no-transition { transition: none; }
  #card-column-cs .product-card { width: 160px; height: 200px; }
  #card-column-cs .card-img-wrap { height: 160px; }

  /* ── PRODUCT CARD (shared) ── */
  .product-card {
    flex-shrink: 0;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    cursor: pointer;
  }
  .card-img-wrap {
    flex-shrink: 0;
    overflow: hidden;
    border-radius: 8px 8px 0 0;
  }
  .card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }
  .card-bottom {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px;
    flex: 1;
  }
  .card-prod-name {
    flex: 1;
    min-width: 0;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 10px;
    line-height: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-vedi {
    flex-shrink: 0;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.1px;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 2px 4px 4px;
    line-height: 1;
    cursor: pointer;
    white-space: nowrap;
  }

  /* ── CTA AREA ── */
  .cta-area {
    height: 73px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cta-button {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 14px;
    line-height: 1;
    border-radius: 12px;
    padding: 12px 24px;
    border: 1px solid transparent;
    cursor: pointer;
    outline: none;
  }

  /* ── STEP 2 PLACEHOLDER ── */
  .step2-overlay {
    position: absolute;
    inset: 0;
    background: #888888;
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }
  .step2-overlay.visible { display: flex; }
  .step2-overlay p {
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 16px;
    font-weight: 500;
  }
  .step2-overlay small {
    color: rgba(255,255,255,0.65);
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
  }

  /* ── SAFARI FOOTER (iOS 26 Liquid Glass) ── */
  .safari-footer {
    height: 80px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px 16px;
    gap: 10px;
    background: transparent;
    z-index: 50;
  }
  .safari-glass-btn {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 24px;
    background: rgba(250,250,250,0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.9);
    box-shadow: 0 2px 40px 0 rgba(0,0,0,0.1);
  }
  .safari-glass-btn svg {
    width: 22px;
    height: 22px;
    display: block;
  }
  .safari-glass-bar {
    flex: 1;
    height: 48px;
    border-radius: 24px;
    background: rgba(250,250,250,0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.9);
    box-shadow: 0 2px 42px 0 rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 14px;
    position: relative;
  }
  .safari-glass-bar-url {
    font-family: 'SF Pro Text', -apple-system, sans-serif;
    font-weight: 500;
    font-size: 17px;
    color: #1b1b1b;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .safari-glass-bar .bar-icon-left {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
  }
  .safari-glass-bar .bar-icon-right {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
  }
  .safari-glass-bar svg {
    width: 16px;
    height: 16px;
    display: block;
  }

  /* ── DEMO BADGE ── */
  .demo-badge {
    position: absolute;
    top: 8px; right: 8px;
    z-index: 200;
    background: rgba(0,0,0,0.55);
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 4px;
    pointer-events: none;
    display: none;
  }
  .demo-badge.visible { display: block; }

  /* ════════════════════════════════════════════
     VIEWER CONTEXT (marketplace / website)
  ════════════════════════════════════════════ */
  #viewer-layer {
    position: absolute;
    top: 0; left: 0;
    width: 390px;
    height: 844px;
    background: #fff;
    z-index: 60;
    display: none;
    overflow: hidden;
  }
  #viewer-layer.active { display: block; }

  /* ── WEBSITE VIEW ── */
  #website-view {
    width: 390px; height: 844px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: none;
  }
  #website-view img { width: 100%; display: block; }

  /* ── MARKETPLACE: HOME ── */
  #market-home {
    position: absolute; top: 0; left: 0;
    width: 390px; height: 844px;
    flex-direction: column;
    background: #fff;
    overflow: hidden;
    display: none;
  }
  .mh-header { flex-shrink: 0; }
  .mh-header img { width: 100%; display: block; }
  .mh-scroll {
    flex: 1; min-height: 200px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .mh-content {
    display: flex; flex-wrap: wrap;
    justify-content: center; gap: 8px; padding: 8px;
  }
  .mh-flyer {
    display: flex; flex-direction: column; gap: 8px;
    width: calc(50% - 8px); cursor: pointer;
  }
  .mh-flyer img { width: 100%; display: block; }
  .mh-cover-home {
    width: 100%; min-height: 240px;
    background-color: #ebebf5;
    background-position: center;
    background-size: contain;
    background-repeat: no-repeat;
  }
  .mh-flyer-img { width: calc(50% - 8px); }
  .mh-flyer-img img { width: 100%; display: block; }
  .mh-footer { flex-shrink: 0; }
  .mh-footer img { width: 100%; display: block; }

  /* ── MARKETPLACE: VIEWER ── */
  #market-viewer {
    position: absolute; top: 0; left: 0;
    width: 390px; height: 844px;
    flex-direction: column;
    background: #282832;
    overflow: hidden;
    display: none;
  }
  .mv-header { flex-shrink: 0; }
  .mv-header img { width: 100%; display: block; }
  .mv-info-bar {
    flex-shrink: 0; display: flex;
    align-items: center; justify-content: space-between;
    padding: 6px 12px;
  }
  .mv-info-badge {
    background: rgba(0,0,0,0.55); color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 10px; white-space: nowrap;
  }
  .mv-swiper { flex: 1; min-height: 0; overflow: hidden; }
  .mv-swiper .swiper { width: 100%; height: 100%; }
  .mv-slide {
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #282832;
  }
  .mv-footer { flex-shrink: 0; cursor: pointer; }
  .mv-footer img { width: 100%; display: block; }
</style>
</head>
<body>
<div class="phone" id="phone">

  <div class="demo-badge" id="demo-badge">Demo Mode</div>

  <!-- LOADING -->
  <div class="loading" id="state-loading">
    <div class="spinner"></div>
    <p>Loading campaign…</p>
  </div>

  <!-- ERROR -->
  <div class="error-screen" id="state-error" style="display:none">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="22" stroke="#ccc" stroke-width="2"/>
      <path d="M24 14v14M24 32v2" stroke="#ccc" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <h2>Campaign not found</h2>
    <p id="error-msg">The campaign could not be loaded.</p>
  </div>

  <!-- VIEWER CONTEXT (marketplace / website) -->
  <div id="viewer-layer">
    <div id="website-view"></div>
    <div id="market-home"></div>
    <div id="market-viewer"></div>
  </div>

  <!-- PROTOTYPE -->
  <div id="proto" style="display:none; flex-direction:column; flex:1">

    <!-- AD CONTENT -->
    <!-- CLOSE BUTTON -->
    <div class="close-btn" id="close-btn" onclick="history.back()" style="position:absolute;top:16px;right:16px;z-index:55">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
        <circle cx="19" cy="19" r="18" stroke-width="1.5" id="close-circle"/>
        <path d="M13 13l12 12M25 13L13 25" stroke-width="1.8" stroke-linecap="round" id="close-x"/>
      </svg>
    </div>

    <div class="ad-content" id="ad-content">

      <!-- ══ BANNER ══ -->
      <div class="ad-body" id="ad-body-banner">
        <div class="ad-inner">
          <div class="logo-area">
            <img id="banner-logo" src="" alt="" style="display:none">
          </div>
          <div class="image-area">
            <img id="banner-img" src="" alt="">
          </div>
        </div>
        <div class="cta-area">
          <button class="cta-button" id="cta-btn-banner" onclick="initPass2(window._campaignData)">Find the store</button>
        </div>
      </div>

      <!-- ══ CAROUSEL VERTICAL ══ -->
      <div class="ad-body" id="ad-body-cv">
        <div class="carousel-layout">
          <div class="col-logo-wrap">
            <img id="col-logo" src="" alt="" class="col-logo" style="display:none">
          </div>
          <div class="carousel-left">
            <div class="claim-text" id="claim-text-cv"></div>
          </div>
          <div id="card-column-cv">
            <div id="card-track-cv"></div>
          </div>
        </div>
        <div class="cta-area">
          <button class="cta-button" id="cta-btn-cv" onclick="initPass2(window._campaignData)">Find the store</button>
        </div>
      </div>

      <!-- ══ CAROUSEL SQUARE ══ -->
      <div class="ad-body" id="ad-body-cs">
        <div class="carousel-layout">
          <div class="content-logo-wrap">
            <img id="content-logo" src="" alt="">
          </div>
          <div class="carousel-left">
            <div class="claim-text" id="claim-text-cs"></div>
          </div>
          <div id="card-column-cs">
            <div id="card-track-cs"></div>
          </div>
        </div>
        <div class="cta-area">
          <button class="cta-button" id="cta-btn-cs" onclick="initPass2(window._campaignData)">Find the store</button>
        </div>
      </div>

      <!-- STEP 2 PLACEHOLDER -->
      <div class="step2-overlay" id="step2-overlay">
        <p>Step 2 — coming in Pass 2</p>
        <small>Location permission modal</small>
      </div>

    </div><!-- /ad-content -->

  </div><!-- /proto -->

</div><!-- /phone -->

<script>
// ─── DEMO DATA ────────────────────────────────────────────────────────

    websiteURL:     '',

    Store03Name:    'LIDL Getafe',
    Store03LogoURL: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Lidl-Logo.svg/2048px-Lidl-Logo.svg.png',

  carousel_vertical: {
    campaignID:              'click2go-demo-cv',

    clientLogoURL:           'assets/flipp-sf-logo.svg',
    claimText:               'Premium nutrition for your pet',
    globalBkgType:           'color',

// ─── HELPERS ──────────────────────────────────────────────────────────
function isDark(hex) {
  if (!hex || hex.startsWith('linear') || !hex.startsWith('#')) return false;
  const c = hex.replace('#', '');
  const r = parseInt(c.length === 3 ? c[0]+c[0] : c.slice(0,2), 16);
  const g = parseInt(c.length === 3 ? c[1]+c[1] : c.slice(2,4), 16);
  const b = parseInt(c.length === 3 ? c[2]+c[2] : c.slice(4,6), 16);
  return (r*0.299 + g*0.587 + b*0.114) < 128;
}

function buildBg(d) {
  if (d.globalBkgType === 'gradient' && d.globalBkgTop && d.globalBkgBottom) {
    return `linear-gradient(to bottom, ${d.globalBkgTop}, ${d.globalBkgBottom})`;
  }
  return d.globalBkgColor || '#EBEBF5';
}

// ─── BUILD PRODUCT CARD ───────────────────────────────────────────────
function buildCard(prod, d) {
  const card = document.createElement('div');
  card.className = 'product-card';

  let cardBg;
  if (d.productBkgType === 'gradient' && d.productBkgTop && d.productBkgBottom) {
    cardBg = `linear-gradient(to bottom, ${d.productBkgTop}, ${d.productBkgBottom})`;
  } else {
    cardBg = d.productBkgColor || 'rgba(255,255,255,0.8)';
  }
  card.style.background = cardBg;

  const imgWrap = document.createElement('div');
  imgWrap.className = 'card-img-wrap';
  if (prod.imageURL) {
    const img = document.createElement('img');
    img.src = resolveURL(prod.imageURL);
    img.alt = prod.name || '';
    img.onerror = () => { imgWrap.style.background = 'rgba(0,0,0,0.06)'; };
    imgWrap.appendChild(img);
  }

  const bottom = document.createElement('div');
  bottom.className = 'card-bottom';

  const nameEl = document.createElement('p');
  nameEl.className = 'card-prod-name';
  nameEl.textContent = prod.name || '';
  nameEl.style.color = d.productTextColor || '#000000';

  const CARD_BTN_LABELS = { IT:'Vedi', ES:'Ver', FR:'Voir', DE:'Sehen', PT:'Ver' };
  const cardBtnLoc = (d.location || '').toUpperCase();
  const vediEl = document.createElement('div');
  vediEl.className = 'card-vedi';
  vediEl.textContent = CARD_BTN_LABELS[cardBtnLoc] || 'View';
  vediEl.style.background  = d.productCardBtnBkgColor  || '#ffffff';
  vediEl.style.color        = d.productCardBtnTextColor || '#000000';
  vediEl.style.borderColor  = d.productCardBtnBkgColor  || '#000000';

  bottom.appendChild(nameEl);
  bottom.appendChild(vediEl);
  card.appendChild(imgWrap);
  card.appendChild(bottom);

  if (prod.linkURL) {
    card.addEventListener('click', () => { window.location.href = prod.linkURL; });
  }
  return card;
}

// ─── AUTO-SCROLL ──────────────────────────────────────────────────────
// Duplicated list [P1,P2,P3,P1,P2,P3] for seamless vertical looping.
let scrollTimer = null;

function initAutoScroll(products, d, cfg) {
  if (products.length < 2) return;

  const track = document.getElementById(cfg.trackId);
  track.innerHTML = '';

  const CARD_STEP = cfg.h + cfg.gap;
  const doubled = [...products, ...products];
  doubled.forEach(prod => track.appendChild(buildCard(prod, d)));

  let idx = 0;

  function scrollTo(i, animate) {
    if (!animate) track.classList.add('no-transition');
    track.style.transform = `translateY(-${i * CARD_STEP}px)`;
    if (!animate) {
      track.offsetHeight; // force reflow
      track.classList.remove('no-transition');
    }
  }

  function tick() {
    idx++;
    if (idx >= products.length) {
      scrollTo(idx, true);
      scrollTimer = setTimeout(() => {
        idx = idx - products.length;
        scrollTo(idx, false);
        scrollTimer = setTimeout(tick, 3000);
      }, 650);
    } else {
      scrollTo(idx, true);
      scrollTimer = setTimeout(tick, 3000);
    }
  }

  scrollTimer = setTimeout(tick, 2500);
}

// ─── RENDER ───────────────────────────────────────────────────────────
function resolveURL(url) {
  if (!url) return '';
  if (url.startsWith('http://') || url.startsWith('https://')) return url;
  return url.replace(/^\/+/, '');
}

function render(d) {
  window._campaignData = d;
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('proto').style.display = 'flex';

  const phone = document.getElementById('phone');
  const bg = buildBg(d);
  const topHex = d.globalBkgType === 'gradient' ? (d.globalBkgTop || '#000') : (d.globalBkgColor || '#fff');
  const iconColor = isDark(topHex) ? '#ffffff' : '#000000';
  const type = (d.templateType || '').toLowerCase();

  phone.style.setProperty('--global-text-color', d.globalTextColor || '#000000');
  phone.style.setProperty('--button-bkg-color',  d.buttonBkgColor  || '#000000');
  phone.style.setProperty('--button-text-color', d.buttonTextColor || '#ffffff');
  phone.style.setProperty('--icon-color', iconColor);

  // Set background once on the phone wrapper only
  document.getElementById('phone').style.background = bg;
  document.getElementById('ad-content').style.background = 'transparent';

  // Close button color
  document.getElementById('close-circle').setAttribute('stroke', iconColor);
  document.getElementById('close-x').setAttribute('stroke', iconColor);

  const loc = (d.location || '').toUpperCase();
  const ctaLabel = CTA_LABELS[loc] || 'Find the store';

  // Hide all ad bodies, show the matching one
  ['ad-body-banner', 'ad-body-cv', 'ad-body-cs'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });

  // ── BANNER ──
  if (type === 'banner') {
    document.getElementById('ad-body-banner').classList.add('active');

    if (d.clientLogoURL) {
      const logoEl = document.getElementById('banner-logo');
      logoEl.src = resolveURL(d.clientLogoURL);
      logoEl.style.display = 'block';
      logoEl.onerror = () => { logoEl.style.display = 'none'; };
    }
    if (d.bannerURL) {
      const img = document.getElementById('banner-img');
      img.src = resolveURL(d.bannerURL);
      img.onerror = () => { img.style.opacity = '0'; };
    }

    const btn = document.getElementById('cta-btn-banner');
    btn.textContent = ctaLabel;
    btn.style.background = d.buttonBkgColor  || '#000000';
    btn.style.color       = d.buttonTextColor || '#ffffff';
    btn.style.borderColor = d.buttonBkgColor  || '#000000';

  // ── CAROUSEL VERTICAL ──
  } else if (type === 'carousel_vertical') {
    document.getElementById('ad-body-cv').classList.add('active');

    if (d.clientLogoURL) {
      const colLogo = document.getElementById('col-logo');
      colLogo.src = resolveURL(d.clientLogoURL);
      colLogo.style.display = 'block';
      colLogo.onerror = () => { colLogo.style.display = 'none'; };
    }
    document.getElementById('claim-text-cv').textContent = d.claimText || '';

    const btn = document.getElementById('cta-btn-cv');
    btn.textContent = ctaLabel;
    btn.style.background = d.buttonBkgColor  || '#000000';
    btn.style.color       = d.buttonTextColor || '#ffffff';
    btn.style.borderColor = d.buttonBkgColor  || '#000000';

    const products = [];
    for (let pi = 1; pi <= 10; pi++) {
      const pp = ('0'+pi).slice(-2);
      const pUrl = d['Prod'+pp+'ImageURL'];
      if (pUrl && pUrl.trim()) products.push({ name: d['Prod'+pp+'Name'], imageURL: pUrl.trim(), linkURL: d['Prod'+pp+'LinkURL'] });
    }

    const track = document.getElementById('card-track-cv');
    track.innerHTML = '';
    if (products.length === 1) {
      track.appendChild(buildCard(products[0], d));
    } else if (products.length > 1) {
      initAutoScroll(products, d, CARD_CONFIG.carousel_vertical);
    }

  // ── CAROUSEL SQUARE ──
  } else if (type === 'carousel_square') {
    document.getElementById('ad-body-cs').classList.add('active');

    if (d.clientLogoURL) {
      const contentLogo = document.getElementById('content-logo');
      contentLogo.src = resolveURL(d.clientLogoURL);
      contentLogo.style.display = 'block';
      contentLogo.onerror = () => { contentLogo.style.display = 'none'; };
    }
    document.getElementById('claim-text-cs').textContent = d.claimText || '';

    const btn = document.getElementById('cta-btn-cs');
    btn.textContent = ctaLabel;
    btn.style.background = d.buttonBkgColor  || '#000000';
    btn.style.color       = d.buttonTextColor || '#ffffff';
    btn.style.borderColor = d.buttonBkgColor  || '#000000';

    const products = [];
    for (let pi = 1; pi <= 10; pi++) {
      const pp = ('0'+pi).slice(-2);
      const pUrl = d['Prod'+pp+'ImageURL'];
      if (pUrl && pUrl.trim()) products.push({ name: d['Prod'+pp+'Name'], imageURL: pUrl.trim(), linkURL: d['Prod'+pp+'LinkURL'] });
    }

    const track = document.getElementById('card-track-cs');
    track.innerHTML = '';
    if (products.length === 1) {
      track.appendChild(buildCard(products[0], d));
    } else if (products.length > 1) {
      initAutoScroll(products, d, CARD_CONFIG.carousel_square);
    }

  } else {
    showError('Unknown templateType: "' + d.templateType + '"');
  }
}

// ─── LOAD DATA ────────────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search);
  const id     = params.get('id');
  const type   = params.get('type');   // demo shortcut: ?type=carousel_vertical
  const viewer = params.get('viewer'); // marketplace | website

  // Demo mode (no id)
  if (!id) {
    document.getElementById('demo-badge').classList.add('visible');
    const demoKey = (type && DEMO_DATA[type]) ? type : 'banner';
    render(DEMO_DATA[demoKey]);
    return;
  }

  // Fetch campaign data
  let data;
  try {
    const res = await fetch('api/get.php?id=' + encodeURIComponent(id));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch (err) {
    showError('Could not fetch campaign "' + id + '". ' + err.message);
    return;
  }

  if (!data || !data.campaignID) {
    showError('Campaign "' + id + '" was not found.');
    return;
  }

  // Store data globally for viewer → ad transition
  window._campaignData = data;

  // If viewer context requested, show viewer first; otherwise show ad directly
  if (viewer === 'website') {
    initWebsite(data);
  } else if (viewer === 'marketplace') {
    initMarketplace(data);
  } else {
    render(data);
  }
}

init();

<script>
(function () {
  var DESIGN_W = 390;
  var DESIGN_H = 844;

  function applyZoom() {
    var el = document.getElementById('phone')
      || document.getElementById('viewer-container')
      || document.querySelector('.phone');
    if (!el) return;

    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var isMobile = vw < 768;

    if (isMobile) {
      var z = vw / DESIGN_W;
      el.style.zoom = z;
      document.body.style.background = 'white';
      document.body.style.minHeight = '100vh';
      document.body.style.overflow = 'visible';
      document.body.style.alignItems = 'flex-start';
    } else {
      var zx = vw / DESIGN_W;
      var zy = vh / DESIGN_H;
      var z = Math.min(zx, zy) * 0.92;
      el.style.zoom = z;
      document.body.style.background = '#e5e5e5';
      document.body.style.minHeight = '100vh';
      document.body.style.alignItems = zy < zx ? 'flex-start' : 'center';
      document.body.style.overflow = 'hidden';
    }
  }

  applyZoom();
  window.addEventListener('resize', applyZoom);
  window.addEventListener('orientationchange',
    function () { setTimeout(applyZoom, 300); });
})();
</script>
