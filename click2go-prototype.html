<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1.0">
<title>Click2Go Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #888;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
    font-family: 'Montserrat', sans-serif;
  }
  .phone {
    width: 430px;
    height: 932px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #ddd;
    border-top-color: #555;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size: 13px; color: #666; text-align: center; line-height: 1.5; padding: 0 32px; }
</style>
</head>
<body>
<div class="phone">
  <div class="spinner" id="spinner"></div>
  <p id="msg">Loading campaign…</p>
</div>
<script>
const ROUTES = {
  'banner':            'click2go-banner.html',
  'carousel_vertical': 'click2go-carousel-vertical.html',
  'carousel_square':   'click2go-carousel-square.html',
};

async function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'No campaign ID provided. Append ?id=click2go-XXXXXXXXXX to the URL.';
    return;
  }

  let data;
  try {
    const res = await fetch('api/get.php?id=' + encodeURIComponent(id));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch (err) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'Could not fetch campaign "' + id + '". ' + err.message;
    return;
  }

  if (!data || !data.campaignID) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'Campaign "' + id + '" was not found.';
    return;
  }

  const type = (data.templateType || '').toLowerCase();
  const dest = ROUTES[type];

  if (!dest) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'Unknown templateType: "' + data.templateType + '"';
    return;
  }

  window.location.replace(dest + '?id=' + encodeURIComponent(id));
}

init();
</script>
</body>
</html>

<!-- ═══════════════════════════════════════════════════════════════════
  Routes:
    banner            → click2go-banner.html
    carousel_vertical → click2go-carousel-vertical.html
    carousel_square   → click2go-carousel-square.html
═══════════════════════════════════════════════════════════════════ -->
