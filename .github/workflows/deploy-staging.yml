name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Staging via FTP

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy to Staging via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_STAGING_PATH }}
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.vscode/**
            **/.DS_Store
            **/*.log
            **/*.md
            **/CLAUDE.md
            **/BRAND.md
            **/ffmpeg-test.php
            **/debug-log.php
            **/upload-check.php
            **/encoder-test.php
            **/ffmpeg-direct-test.php
            **/.gitkeep
          log-level: verbose
          timeout: 120000
